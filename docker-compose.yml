services:
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: velocitybench_benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark123
      # Data volume selector: xs (default), medium, large
      # Pass as: DATA_VOLUME=medium docker compose up postgres
      DATA_VOLUME: ${DATA_VOLUME:-xs}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
      - ./database/fraiseql_cqrs_schema.sql:/docker-entrypoint-initdb.d/02-fraiseql-cqrs.sql
      - ./database/04-cqrs-extensions.sql:/docker-entrypoint-initdb.d/03-cqrs-extensions.sql
      - ./database/05-medium-seed.sql:/docker-entrypoint-initdb.d/04-medium-seed.sql
      - ./frameworks/fraiseql/database/extensions.sql:/docker-entrypoint-initdb.d/05-fraiseql-views.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d velocitybench_benchmark"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - velocitybench-benchmark
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,pg_buffercache,pg_tviews
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=all
      -c shared_buffers=${DB_SHARED_BUFFERS:-8GB}
      -c effective_cache_size=${DB_EFFECTIVE_CACHE_SIZE:-24GB}
      -c work_mem=${DB_WORK_MEM:-64MB}
      -c maintenance_work_mem=${DB_MAINTENANCE_WORK_MEM:-2GB}
      -c max_connections=${DB_MAX_CONNECTIONS:-300}
      -c max_worker_processes=${DB_MAX_WORKER_PROCESSES:-8}
      -c max_parallel_workers_per_gather=${DB_MAX_PARALLEL_WORKERS_PER_GATHER:-4}
      -c max_parallel_workers=${DB_MAX_PARALLEL_WORKERS:-8}
      -c max_wal_size=${DB_MAX_WAL_SIZE:-4GB}
      -c wal_buffers=${DB_WAL_BUFFERS:-16MB}
      -c random_page_cost=${DB_RANDOM_PAGE_COST:-1.1}
      -c benchmark.data_volume=${DATA_VOLUME:-xs}

  # ============================================================================
  # Benchmark frameworks — start all 8 with: docker compose --profile benchmark up
  # ============================================================================

  fraiseql:
    # FraiseQL v2.0.0-beta.3 — Variant A: v_* on-the-fly JSONB views
    build:
      context: ./frameworks/fraiseql
      args:
        SCHEMA_FILE: schema.py
    ports:
      - "8815:8815"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://benchmark:benchmark123@postgres:5432/velocitybench_benchmark
      - RUST_LOG=info
      - FRAISEQL_CONFIG=fraiseql.toml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8815/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - benchmark
      - fraiseql
    networks:
      - velocitybench-benchmark

  fraiseql-tv:
    # FraiseQL v2.0.0-beta.3 — Variant B: tv_* pre-computed JSONB tables
    build:
      context: ./frameworks/fraiseql
      args:
        SCHEMA_FILE: schema_tv.py
    ports:
      - "8816:8815"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./frameworks/fraiseql/fraiseql-tv.toml:/app/fraiseql-tv.toml
    environment:
      - DATABASE_URL=postgresql://benchmark:benchmark123@postgres:5432/velocitybench_benchmark
      - RUST_LOG=info
