    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=velocitybench_benchmark
      - DB_USER=benchmark
      - DB_PASSWORD=benchmark123
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - go-graphql-go
      - benchmark
    networks:
      - velocitybench-benchmark

  gin-rest:
    build: ./frameworks/gin-rest
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=velocitybench_benchmark
      - DB_USER=benchmark
      - DB_PASSWORD=benchmark123
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - gin-rest
      - benchmark
    networks:
      - velocitybench-benchmark

  php-laravel:
    build: ./frameworks/php-laravel
    ports:
      - "8009:8009"
    depends_on:
      postgres:
        condition: service_started
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=velocitybench_benchmark
      - DB_USERNAME=benchmark
      - DB_PASSWORD=benchmark123
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/api/health"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks:
      - velocitybench-benchmark

  ruby-rails:
    build: ./frameworks/ruby-rails
    ports:
      - "8012:8000"
    depends_on:
      postgres:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://benchmark:benchmark123@postgres:5432/velocitybench_benchmark
      - RAILS_ENV=production
      - SECRET_KEY_BASE=velocitybench_secret_key_base_for_benchmarking_only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks:
      - velocitybench-benchmark

  csharp-dotnet:
    build: ./frameworks/csharp-dotnet
    ports:
      - "8025:8080"
    depends_on:
      postgres:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=velocitybench_benchmark;Username=benchmark;Password=benchmark123
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks:
      - velocitybench-benchmark

  go-gqlgen:
    build: ./frameworks/go-gqlgen
    ports:
      - "4010:4009"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=velocitybench_benchmark
      - DB_USER=benchmark
      - DB_PASSWORD=benchmark123
      - PORT=4009
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:4009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - benchmark
    networks:
      - velocitybench-benchmark

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  jmeter-master:
    image: jmeter:5.6-jdk11-alpine
    profiles: [jmeter]
    ports:
      - "1099:1099"
      - "50500:50500"
    volumes:
      - ./tests/perf/jmeter:/tests
      - ./tests/perf/results:/results
    depends_on:
      postgres:
        condition: service_started
    environment:
      - JMETER_HOME=/opt/jmeter
    networks:
      - velocitybench-benchmark

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  velocitybench-benchmark:
    external: true
    name: velocitybench-benchmark