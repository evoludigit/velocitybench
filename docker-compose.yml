services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fraiseql_benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark123
      # Data volume selector: small, medium, large, xlarge
      DATA_VOLUME: ${DATA_VOLUME:-small}
      TMPDIR: /data/tmp
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
      - ./database/fraiseql_cqrs_schema.sql:/docker-entrypoint-initdb.d/02-fraiseql-cqrs.sql
      - ./database/04-cqrs-extensions.sql:/docker-entrypoint-initdb.d/03-cqrs-extensions.sql
      # Large dataset loaded conditionally via startup script
      - ./database/05-large-dataset.sql:/scripts/05-large-dataset.sql:ro
      # Mount /data/tmp to avoid filling /tmp
      - /data/tmp:/data/tmp
    # Temporarily disable health check - PostgreSQL is working
    # healthcheck:
    #   test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/5432 && echo 'PostgreSQL is listening'"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    networks:
      - fraiseql-benchmark
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,pg_buffercache
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=all
      -c shared_buffers=${DB_SHARED_BUFFERS:-8GB}
      -c effective_cache_size=${DB_EFFECTIVE_CACHE_SIZE:-24GB}
      -c work_mem=${DB_WORK_MEM:-64MB}
      -c maintenance_work_mem=${DB_MAINTENANCE_WORK_MEM:-2GB}
      -c max_connections=${DB_MAX_CONNECTIONS:-300}
      -c max_worker_processes=${DB_MAX_WORKER_PROCESSES:-8}
      -c max_parallel_workers_per_gather=${DB_MAX_PARALLEL_WORKERS_PER_GATHER:-4}
      -c max_parallel_workers=${DB_MAX_PARALLEL_WORKERS:-8}
      -c max_wal_size=${DB_MAX_WAL_SIZE:-4GB}
      -c wal_buffers=${DB_WAL_BUFFERS:-16MB}
      -c random_page_cost=${DB_RANDOM_PAGE_COST:-1.1}

  # Framework containers
  fraiseql:
    build: ./frameworks/fraiseql
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fraiseql_benchmark
      - DB_USER=benchmark
      - DB_PASSWORD=benchmark123
      - DB_POOL_MIN=20
      - DB_POOL_MAX=100
      - DB_STATEMENT_CACHE_SIZE=100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks:
      - fraiseql-benchmark

  strawberry:
    build: ./frameworks/strawberry
    ports:
      - "8011:8000"
    depends_on:
      postgres:
