      - DB_PORT=5432
      - DB_NAME=fraiseql_benchmark
      - DB_USER=benchmark
      - DB_PASSWORD=benchmark123
      - DB_POOL_MIN=10
      - DB_POOL_MAX=50
      - DB_STATEMENT_CACHE_SIZE=100
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
