global:
  scrape_interval: 1s
  evaluation_interval: 5s
  external_labels:
    monitor: 'fraiseql-benchmark'

rule_files:
  - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s

  # PostgreSQL database metrics (1s interval for Phase 8)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 1s
    metrics_path: /metrics

  # System-level metrics via Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 1s
    metrics_path: /metrics

  # Container-level metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 1s
    metrics_path: /metrics

  # Framework-specific metrics (as available)
  - job_name: 'fraiseql'
    static_configs:
      - targets: ['fraiseql:4000']
    scrape_interval: 1s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  - job_name: 'strawberry'
    static_configs:
      - targets: ['strawberry:8000']
