groups:
  # System-level metrics from node-exporter
  - name: system_metrics
    interval: 30s
    rules:
      # CPU usage by mode
      - record: node:cpu:usage_percent
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      # Memory utilization
      - record: node:memory:usage_percent
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100

      - record: node:memory:available_bytes
        expr: node_memory_MemAvailable_bytes

      # Disk I/O rates
      - record: node:disk:read_bytes_per_sec
        expr: rate(node_disk_read_bytes_total[5m])

      - record: node:disk:write_bytes_per_sec
        expr: rate(node_disk_written_bytes_total[5m])

      - record: node:disk:io_time_seconds
        expr: rate(node_disk_io_time_seconds_total[5m])

      # Network throughput
      - record: node:network:receive_bytes_per_sec
        expr: rate(node_network_receive_bytes_total[5m])

      - record: node:network:transmit_bytes_per_sec
        expr: rate(node_network_transmit_bytes_total[5m])

  # Container-level metrics from cAdvisor
  - name: container_metrics
    interval: 30s
    rules:
      # Per-framework CPU usage
      - record: container:cpu:usage_percent
        expr: rate(container_cpu_usage_seconds_total{container_label_framework!=""}[5m]) * 100

      # Per-framework memory usage
      - record: container:memory:usage_bytes
        expr: container_memory_usage_bytes{container_label_framework!=""}

      - record: container:memory:working_set_bytes
        expr: container_memory_working_set_bytes{container_label_framework!=""}

      # Container restart counts
      - record: container:restarts:total
        expr: container_start_time_seconds{container_label_framework!=""} > 0

      # Network traffic by container
      - record: container:network:receive_bytes_per_sec
        expr: rate(container_network_receive_bytes_total{container_label_framework!=""}[5m])

      - record: container:network:transmit_bytes_per_sec
        expr: rate(container_network_transmit_bytes_total{container_label_framework!=""}[5m])

      # Container CPU by framework (aggregated)
      - record: framework:cpu:usage_cores
        expr: sum by (container_label_framework) (rate(container_cpu_usage_seconds_total{container_label_framework!=""}[5m]))

      # Container memory by framework (aggregated)
      - record: framework:memory:usage_bytes
        expr: sum by (container_label_framework) (container_memory_working_set_bytes{container_label_framework!=""})

  # Database metrics from postgres-exporter
  - name: database_metrics
    interval: 30s
    rules:
      # Connection pool utilization
      - record: postgres:connections:active
        expr: pg_stat_activity_count{state="active"}

      - record: postgres:connections:idle
        expr: pg_stat_activity_count{state="idle"}

      - record: postgres:connections:total
        expr: sum(pg_stat_activity_count)

      # Query performance
      - record: postgres:query:calls_per_sec
        expr: rate(pg_stat_statements_calls[5m])

      - record: postgres:query:avg_duration_seconds
        expr: rate(pg_stat_statements_total_time[5m]) / rate(pg_stat_statements_calls[5m])

      # Cache hit ratios
      - record: postgres:cache:hit_ratio
        expr: |
          rate(pg_stat_database_blks_hit[5m]) /
          (rate(pg_stat_database_blks_hit[5m]) + rate(pg_stat_database_blks_read[5m]))

      # Transaction rates
      - record: postgres:transactions:commits_per_sec
        expr: rate(pg_stat_database_xact_commit[5m])

      - record: postgres:transactions:rollbacks_per_sec
        expr: rate(pg_stat_database_xact_rollback[5m])

      # Lock waits
      - record: postgres:locks:waiting
        expr: pg_locks_count{mode="AccessExclusiveLock"}

      # Tuple statistics
      - record: postgres:tuples:inserted_per_sec
        expr: rate(pg_stat_database_tup_inserted[5m])

      - record: postgres:tuples:updated_per_sec
        expr: rate(pg_stat_database_tup_updated[5m])

      - record: postgres:tuples:deleted_per_sec
        expr: rate(pg_stat_database_tup_deleted[5m])

  # Application metrics (from framework exporters)
  - name: application_metrics
    interval: 30s
    rules:
      # HTTP request rates (when available)
      - record: http:requests:rate_5m
        expr: rate(http_requests_total[5m])

      - record: http:requests:rate_1m
        expr: rate(http_requests_total[1m])

      # Response time percentiles (when available)
      - record: http:response:p50_latency
        expr: histogram_quantile(0.50, rate(http_response_duration_seconds_bucket[5m]))

      - record: http:response:p95_latency
        expr: histogram_quantile(0.95, rate(http_response_duration_seconds_bucket[5m]))

      - record: http:response:p99_latency
        expr: histogram_quantile(0.99, rate(http_response_duration_seconds_bucket[5m]))

      # Error rates (when available)
      - record: http:errors:rate_5xx
        expr: rate(http_requests_total{status=~"5.."}[5m])

      - record: http:errors:rate_4xx
        expr: rate(http_requests_total{status=~"4.."}[5m])

      # GraphQL-specific metrics (when available)
      - record: graphql:queries:rate
        expr: rate(graphql_query_total[5m])

      - record: graphql:queries:duration_p95
        expr: histogram_quantile(0.95, rate(graphql_query_duration_seconds_bucket[5m]))

  # Derived performance metrics for benchmarking
  - name: benchmark_metrics
    interval: 30s
    rules:
      # Requests per second per framework
      - record: benchmark:requests_per_sec:by_framework
        expr: sum by (framework) (rate(http_requests_total[5m]))

      # Average response time by framework
      - record: benchmark:response_time:avg_by_framework
        expr: |
          sum by (framework) (rate(http_response_duration_seconds_sum[5m])) /
          sum by (framework) (rate(http_response_duration_seconds_count[5m]))

      # Error rate percentage by framework
      - record: benchmark:error_rate:percent_by_framework
        expr: |
          (sum by (framework) (rate(http_requests_total{status=~"5.."}[5m])) /
           sum by (framework) (rate(http_requests_total[5m]))) * 100

      # Resource efficiency (requests per MB of memory)
      - record: benchmark:efficiency:requests_per_mb
        expr: |
          sum by (container_label_framework) (rate(http_requests_total[5m])) /
          (sum by (container_label_framework) (container_memory_working_set_bytes{container_label_framework!=""}) / 1024 / 1024)

      # CPU efficiency (requests per CPU core)
      - record: benchmark:efficiency:requests_per_cpu
        expr: |
          sum by (container_label_framework) (rate(http_requests_total[5m])) /
          sum by (container_label_framework) (rate(container_cpu_usage_seconds_total{container_label_framework!=""}[5m]))

      # Database queries per application request
      - record: benchmark:db_queries_per_request
        expr: |
          rate(pg_stat_statements_calls[5m]) /
          rate(http_requests_total[5m])

      # Average database query time
      - record: benchmark:db_query_time_avg
        expr: |
          rate(pg_stat_statements_total_time[5m]) /
          rate(pg_stat_statements_calls[5m])
