# Large Load Test Configuration
# Purpose: Find maximum capacity (10 minutes)
# Expected: Error rate acceptable up to 20%

threads=50
rampup=120
loops=200
duration=600

# Purpose: Identify bottlenecks
# - When does error rate spike?
# - What resource saturates first? (CPU/memory/connections)
# - What's theoretical maximum throughput?

# Stop test if:
# - Error rate >50%
# - Latency p99 >10s
# - System unresponsive