# Framework Registry
# Comprehensive list of all frameworks with metadata for validation

frameworks:
  # Python GraphQL Frameworks
  - name: fraiseql
    language: python
    type: graphql
    port: 4000
    endpoint: /graphql
    health_check: /health
    metrics_endpoint: /metrics
    expected_tables:
      - benchmark.tv_user
      - benchmark.tv_post
      - benchmark.tv_comment
    pool_config:
      min: 20
      max: 30
    features:
      dataloader: native
      statement_caching: true
      metrics: prometheus

  - name: strawberry
    language: python
    type: graphql
    port: 8011
    endpoint: /graphql
    health_check: /health
    expected_tables:
      - benchmark.tb_user
      - benchmark.tb_post
      - benchmark.tb_comment
    pool_config:
      min: 10
      max: 50
    features:
      dataloader: strawberry.DataLoader
      statement_caching: true

  - name: graphene
    language: python
    type: graphql
