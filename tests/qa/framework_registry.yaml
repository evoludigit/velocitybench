# Framework Registry
# Comprehensive list of all frameworks with metadata for validation

frameworks:
  # Python GraphQL Frameworks
  - name: fraiseql
    language: python
    type: graphql
    port: 4000
    endpoint: /graphql
    health_check: /health
    metrics_endpoint: /metrics
    expected_tables:
      - benchmark.tv_user
      - benchmark.tv_post
      - benchmark.tv_comment
    pool_config:
      min: 20
      max: 30
    features:
      dataloader: native
      statement_caching: true
      metrics: prometheus

  - name: strawberry
    language: python
