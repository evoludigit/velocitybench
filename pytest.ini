[pytest]
# VelocityBench pytest configuration
# Standardized test discovery, reporting, and coverage settings

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test output and reporting
addopts =
    # Verbose output with short traceback format
    -v
    --tb=short
    # Show local variables in tracebacks
    --showlocals
    # Report summary of test results
    --report-summary
    # Color output
    --color=yes
    # Coverage integration (if pytest-cov installed)
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    # JUnit XML for CI/CD
    --junit-xml=junit.xml

# Markers for test organization
markers =
    asyncio: marks tests as async (requires pytest-asyncio)
    integration: marks tests as integration tests
    performance: marks tests as performance benchmarks
    security: marks tests as security checks
    slow: marks tests as slow-running
    unit: marks tests as unit tests

# Test paths
testpaths = tests

# Minimum Python version
minversion = 6.0

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Coverage settings (if using pytest-cov)
[coverage:run]
branch = True
source = frameworks, database, tests
omit =
    */site-packages/*
    */distutils/*
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
fail_under = 70
precision = 2
