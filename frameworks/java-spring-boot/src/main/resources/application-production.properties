# Production Environment Configuration
# Override default settings for production deployment

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:fraiseql_benchmark}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool - Production optimized
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA - Production settings
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=50

# Server - Production settings
server.port=${SERVER_PORT:8080}
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20

# Management - Production settings
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=never

# GraphQL - Production settings
graphql.graphiql.enabled=false

# Logging - Production settings
logging.level.root=INFO
logging.level.com.fraiseql=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# Security - Enable in production
# spring.security.enabled=true

# CORS - Restrictive in production
# spring.cors.allowed-origins=https://yourdomain.com