spring:
  application:
    name: fraiseql-spring-boot-graphql
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:fraiseql_benchmark}
    username: ${DB_USER:benchmark}
    password: ${DB_PASSWORD:benchmark123}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
        order_by:
          default_null_ordering: last
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
      use_sql_comments: true
      generate_statistics: ${HIBERNATE_STATS:false}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false

  security:
    enabled: false  # Disabled for benchmarking - enable in production

  graphql:
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:true}
    schema:
      printer:
        enabled: true

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

server:
  port: ${SERVER_PORT:8018}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    keep-alive-timeout: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,env,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        descriptions: true
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

logging:
  level:
    root: INFO
    com.fraiseql: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: ${HIBERNATE_SQL_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${HIBERNATE_PARAM_LEVEL:TRACE}
    org.springframework.graphql: DEBUG
    io.micrometer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/fraiseql-spring-boot.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    hikari:
      minimum-idle: 20
      maximum-pool-size: 100
  logging:
    level:
      com.fraiseql: INFO
      org.hibernate.SQL: WARN
      org.hibernate.type.descriptor.sql.BasicBinder: WARN

---
spring:
  config:
    activate:
      on-profile: development
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
  logging:
    level:
      com.fraiseql: DEBUG
      org.springframework.web: DEBUG