micronaut:
  application:
    name: micronaut-graphql
  server:
    port: 4000

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:velocitybench_benchmark}?currentSchema=benchmark
    username: ${DB_USER:benchmark}
    password: ${DB_PASSWORD:benchmark123}
    driver-class-name: org.postgresql.Driver
    minimum-idle: 10
    maximum-pool-size: 50

