type User {
    id: ID!
    username: String!
    firstName: String!
    lastName: String!
    bio: String
    posts: [Post!]! @hasMany
    comments: [Comment!]! @hasMany
}

type Post {
    id: ID!
    title: String!
    content: String
    author: User! @belongsTo
    comments: [Comment!]! @hasMany
    createdAt: DateTime!
}

type Comment {
    id: ID!
    content: String!
    post: Post! @belongsTo
    author: User! @belongsTo
    createdAt: DateTime!
}

type Query {
    user(id: ID! @eq): User @find
    users(first: Int! @paginate): [User!]! @paginate
    post(id: ID! @eq): Post @find
    posts(first: Int! @paginate): [Post!]! @paginate
    postsByUser(userId: ID!): [Post!]!
    commentsByPost(postId: ID!): [Comment!]!
}
