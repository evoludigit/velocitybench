spring:
  application:
    name: fraiseql-spring-boot
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:fraiseql_benchmark}
    username: ${DB_USER:benchmark}
    password: ${DB_PASSWORD:benchmark123}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8010