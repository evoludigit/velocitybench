# Server
quarkus.http.port=4000

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:velocitybench_benchmark}
quarkus.datasource.username=${DB_USER:benchmark}
quarkus.datasource.password=${DB_PASSWORD:benchmark123}
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.new-connection-sql=SET search_path TO benchmark, public

# GraphQL
quarkus.smallrye-graphql.schema-include-directives=true
quarkus.smallrye-graphql.ui.enable=false
