[pytest]
# Modern pytest-asyncio 1.0+ configuration (2025)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    asyncio: mark test as async
    slow: slow integration tests
    integration: integration tests
    mutation: mutation tests
    error: error handling tests
    query: query resolver tests
    relationship: relationship tests
    schema: schema integration tests
    boundary: boundary condition tests
    validation: input validation tests

# Test paths
testpaths = tests

# Output options
addopts =
    --strict-markers
    --tb=short
    -v
    --disable-warnings

# Timeout for async tests (seconds)
timeout = 10
