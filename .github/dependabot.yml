version: 2
updates:
  # Python dependencies - Check weekly for updates
  - package-ecosystem: "pip"
    directory: "/frameworks/fastapi-rest"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "lionel"
    allow:
      - dependency-type: "all"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

