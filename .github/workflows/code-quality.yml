name: Code Quality & Coverage

on:
  push:
    branches: [main, develop, feat/*]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ruff pylint bandit

      - name: Run Ruff linter
        id: ruff
        run: |
          echo "### 🔍 Ruff Linter Report" >> $GITHUB_STEP_SUMMARY
          ruff check . --select=E9,F,W --ignore=F841,E402 --output-format=github >> $GITHUB_STEP_SUMMARY

      - name: Run Ruff formatter check
        id: ruff-format
        continue-on-error: true
        run: |
          echo "### 📝 Code Format Check" >> $GITHUB_STEP_SUMMARY
          ruff format --check . --diff >> $GITHUB_STEP_SUMMARY || echo "Format issues found (advisory only)" >> $GITHUB_STEP_SUMMARY

      - name: Run Bandit security check
        id: bandit
        continue-on-error: true
        run: |
          echo "### 🔒 Security Issues (Bandit)" >> $GITHUB_STEP_SUMMARY
          bandit -r frameworks/ database/ scripts/ -ll -f json > /tmp/bandit.json 2>/dev/null || true
          bandit -r frameworks/ database/ scripts/ -ll >> $GITHUB_STEP_SUMMARY || true

      - name: Comment on PR with quality results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 📋 Code Quality Report\n\n';

            if ('${{ steps.ruff.outcome }}' === 'failure') {
              comment += '⚠️ **Linting issues found** - See report above\n';
              comment += '**Fix with**: `ruff check --fix .`\n\n';
            } else {
              comment += '✅ **No linting issues**\n\n';
            }

            if ('${{ steps.ruff-format.outcome }}' === 'failure') {
              comment += '⚠️ **Formatting issues found**\n';
              comment += '**Fix with**: `ruff format .`\n\n';
            } else {
              comment += '✅ **Code formatting OK**\n\n';
            }

            comment += '**Next Steps**:\n';
            comment += '- [ ] Fix any linting issues\n';
            comment += '- [ ] Run tests locally\n';
            comment += '- [ ] Update CHANGELOG if needed\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  test-coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        framework:
          - fastapi-rest
          - flask-rest
          - strawberry
          - graphene
          - ariadne
          - asgi-graphql

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio psycopg[binary] || \
            pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=json \
            --cov-report=term \
            --cov-report=xml \
            --junitxml=coverage.json || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: frameworks/${{ matrix.framework }}
          flags: ${{ matrix.framework }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check documentation completeness
        run: |
          echo "### 📚 Documentation Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for required documentation files
          required_docs=(
            "README.md"
            ".github/CONTRIBUTING.md"
            "docs/SECURITY.md"
            "docs/adr/README.md"
          )

          missing=0
          for doc in "${required_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "✅ $doc" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Missing: $doc" >> $GITHUB_STEP_SUMMARY
              missing=$((missing + 1))
            fi
          done

          # Check README quality
          if grep -q "## " README.md 2>/dev/null; then
            echo "✅ README has proper structure" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ README might need better structure" >> $GITHUB_STEP_SUMMARY
          fi

          # Check for TODO/FIXME in actual code (not dependencies)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Code Markers Check" >> $GITHUB_STEP_SUMMARY
          todo_count=$(grep -r "TODO\|FIXME" frameworks/ --include="*.py" --include="*.ts" --include="*.js" 2>/dev/null | grep -v "node_modules\|\.venv" | wc -l)
          if [ $todo_count -eq 0 ]; then
            echo "✅ No TODO/FIXME markers in code" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Found $todo_count TODO/FIXME markers - Consider addressing" >> $GITHUB_STEP_SUMMARY
          fi

  type-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        framework:
          - fastapi-rest
          - flask-rest
          - strawberry
          - graphene
          - ariadne
          - asgi-graphql

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install type checker
        run: |
          pip install ty

      - name: Run type check
        working-directory: frameworks/${{ matrix.framework }}
        id: typecheck
        run: |
          echo "### 🔍 Type Check Report - ${{ matrix.framework }}" >> $GITHUB_STEP_SUMMARY
          ty check . >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo "✅ Type check complete for ${{ matrix.framework }}"
