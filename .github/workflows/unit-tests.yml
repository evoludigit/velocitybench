name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  GO_VERSION: '1.21'
  JAVA_VERSION: '17'
  RUST_VERSION: '1.70'

jobs:
  # Python frameworks: Strawberry, Graphene, FastAPI, Flask, Ariadne, ASGI-GraphQL
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [strawberry, graphene, fastapi-rest, flask-rest, ariadne, asgi-graphql]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'frameworks/${{ matrix.framework }}/requirements*.txt'

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=html --cov-fail-under=70 --junitxml=junit.xml || exit 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/coverage.xml
          flags: python-${{ matrix.framework }}
          fail_ci_if_error: false

  # TypeScript/Node.js frameworks: Apollo, Express, GraphQL Yoga, Mercurius, Fastify, PostGraphile
  typescript-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [apollo-server, express-rest, express-orm, apollo-orm, express-graphql, graphql-yoga, mercurius, postgraphile]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: npm ci || npm install

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          # Detect test runner (most use Vitest, postgraphile uses Jest)
          if grep -q '"vitest"' package.json; then
            npm test -- --coverage || npm test || exit 1
          elif grep -q '"jest"' package.json; then
            npm test || exit 1
          else
            echo "ERROR: No recognized test runner found in package.json"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/coverage/lcov.info
          flags: typescript-${{ matrix.framework }}
          fail_ci_if_error: false

  # Go frameworks: gqlgen, gin, graphql-go, graphql-go
  go-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [go-gqlgen, gin-rest, go-graphql-go, graphql-go]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./... || exit 1
          go tool cover -func=coverage.out || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/coverage.out
          flags: go-${{ matrix.framework }}
          fail_ci_if_error: false

  # Java frameworks: Spring Boot
  java-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [java-spring-boot, spring-boot-orm, spring-boot-orm-naive]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with Maven
        working-directory: frameworks/${{ matrix.framework }}
        run: mvn clean test jacoco:report || exit 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/target/site/jacoco/jacoco.xml
          flags: java-${{ matrix.framework }}
          fail_ci_if_error: false

  # JVM frameworks with different build tools (Gradle, Maven, sbt)
  jvm-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - framework: micronaut-graphql
            build-tool: gradle
            java-version: '21'
          - framework: quarkus-graphql
            build-tool: maven
            java-version: '21'
          - framework: play-graphql
            build-tool: sbt
            java-version: '17'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: ${{ matrix.build-tool }}

      - name: Run tests
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          case "${{ matrix.build-tool }}" in
            maven)
              mvn clean test jacoco:report || exit 1
              ;;
            gradle)
              ./gradlew test || exit 1
              ;;
            sbt)
              sbt test || exit 1
              ;;
          esac

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/target/site/jacoco/jacoco.xml
          flags: jvm-${{ matrix.framework }}
          fail_ci_if_error: false

  # Rust frameworks: async-graphql, actix-web, juniper
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [async-graphql, actix-web-rest, juniper]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Cache Rust/Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: frameworks/${{ matrix.framework }}
        run: cargo test --verbose --all-features || exit 1

  # PHP frameworks: Laravel, Webonyx GraphQL PHP
  php-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [php-laravel, webonyx-graphql-php]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql
          tools: composer, phpunit
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: composer install || echo "No composer.json found"

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          if [ -f "artisan" ]; then
            # Laravel
            php artisan test || exit 1
          elif [ -f "phpunit.xml" ]; then
            # Standard PHPUnit
            vendor/bin/phpunit --coverage-clover coverage.xml || exit 1
          else
            echo "ERROR: No recognized PHP test framework found"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/${{ matrix.framework }}/coverage.xml
          flags: php-${{ matrix.framework }}
          fail_ci_if_error: false

  # Ruby frameworks: Rails, Hanami
  ruby-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [ruby-rails, hanami]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: frameworks/${{ matrix.framework }}

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: |
          if [ -d "spec" ]; then
            # RSpec (Rails frameworks)
            bundle exec rspec || exit 1
          elif [ -d "test" ]; then
            # Minitest (Hanami)
            bundle exec rake test || exit 1
          else
            echo "ERROR: No test directory found (spec/ or test/)"
            exit 1
          fi

  # Hasura - configuration-based GraphQL with API integration tests
  hasura-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'frameworks/hasura/requirements*.txt'

      - name: Install dependencies
        working-directory: frameworks/hasura
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-cov

      - name: Run Hasura API integration tests
        working-directory: frameworks/hasura/tests
        run: |
          pytest . --cov --cov-report=xml --junitxml=junit.xml || exit 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frameworks/hasura/tests/coverage.xml
          flags: hasura
          fail_ci_if_error: false

  # C# frameworks: .NET
  csharp-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [csharp-dotnet]
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0'

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install dependencies
        working-directory: frameworks/${{ matrix.framework }}
        run: dotnet restore || echo "No project files found"

      - name: Run tests with coverage
        working-directory: frameworks/${{ matrix.framework }}
        run: dotnet test /p:CollectCoverage=true /p:CoverageFormat=opencover || exit 1

  # Summary and Coverage Requirements
  coverage-check:
    needs: [python-tests, typescript-tests, go-tests, java-tests, jvm-tests, rust-tests, php-tests, ruby-tests, csharp-tests, hasura-tests, integration-tests, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Check framework test results
        run: |
          # Determine if tests passed
          if [[ "${{ needs.python-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.typescript-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.go-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.java-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.jvm-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.rust-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.php-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.ruby-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.csharp-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.hasura-tests.result }}" == "failure" ]]; then
            echo "❌ One or more framework test suites failed"
            exit 1
          fi
          echo "✅ All framework tests passed successfully!"

          # Integration tests are optional
          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "⚠️  Integration tests failed (this is expected - requires additional setup)"
          fi

          # Quality checks
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "⚠️  Linting warnings detected (see details above)"
          fi

      - name: Generate coverage summary
        if: always()
        # NOTE: When adding new frameworks to CI:
        # 1. Add framework to appropriate language matrix above
        # 2. Update counts below to match actual framework lists
        # 3. Helper: Count with: grep "framework:" .github/workflows/unit-tests.yml | grep -oE "\[.*\]" | tr ',' '\n' | grep -v "^\[" | wc -l
        run: |
          echo "## 📊 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Frameworks | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 6 | ${{ needs.python-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | 8 | ${{ needs.typescript-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | 4 | ${{ needs.go-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java (Maven) | 3 | ${{ needs.java-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JVM (Multi-tool) | 3 | ${{ needs.jvm-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | 3 | ${{ needs.rust-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP | 2 | ${{ needs.php-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruby | 2 | ${{ needs.ruby-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C# | 1 | ${{ needs.csharp-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hasura | 1 | ${{ needs.hasura-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: 33 frameworks tested in CI**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: Additional framework variations available for N+1 testing (apollorm-naive, strawberry-orm-naive, etc.)_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Other | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 See job logs for detailed coverage reports uploaded to Codecov."

  # Integration tests (verify all frameworks can run)
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: velocitybench
          POSTGRES_PASSWORD: password
          POSTGRES_DB: velocitybench_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'tests/integration/requirements.txt'

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests pytest

      - name: Initialize database
        env:
          PGPASSWORD: password
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -U velocitybench -d velocitybench_test; do sleep 1; done

          # Run database schema
          for sql_file in database/*.sql; do
            psql -h localhost -U velocitybench -d velocitybench_test -f "$sql_file" || true
          done

      - name: Run integration tests
        working-directory: tests/integration
        env:
          DATABASE_URL: postgresql://velocitybench:password@localhost:5432/velocitybench_test
        continue-on-error: true
        run: |
          python -m pytest test_frameworks.py -v || echo "Integration tests require additional test fixtures - this is expected"

  # Lint and format checks with Ruff
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting and type-checking tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty

      - name: Lint Python code with Ruff
        run: |
          # Lint database and framework Python code
          ruff check database/seed-data/generator/ frameworks/strawberry frameworks/graphene frameworks/fastapi-rest frameworks/flask-rest
          echo "✅ Ruff linting completed"

      - name: Format check with Ruff
        run: |
          ruff format --check database/seed-data/generator/ frameworks/strawberry frameworks/graphene frameworks/fastapi-rest frameworks/flask-rest
          echo "✅ Code format check completed"

      - name: Type check Python code with ty
        run: |
          # Type check Python frameworks
          ty check database/seed-data/generator/
          echo "✅ Type checking completed"

  # Final status
  test-status:
    needs: [python-tests, typescript-tests, go-tests, java-tests, jvm-tests, rust-tests, php-tests, ruby-tests, csharp-tests, hasura-tests, integration-tests, coverage-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All tests passed
        if: success()
        run: echo "✅ All tests passed successfully!"

      - name: Some tests failed
        if: failure()
        run: |
          echo "❌ Some tests failed. Check the logs above for details."
          exit 1
