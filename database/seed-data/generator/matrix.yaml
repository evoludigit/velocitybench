# Generation Matrix Configuration
# Defines which pattern/framework/depth combinations to generate

# ============================================================
# BLOG POST GENERATION MATRIX
# ============================================================
blog_generation:
  # Patterns to generate blog posts for
  patterns:
    - trinity-pattern
    - n-plus-one
    # FraiseQL-specific patterns:
    - compiled-graphql-execution
    - sql-generation-optimization
    - streaming-json-results
    # Analytics enrichment patterns:
    - analytics-schema-conventions
    # NEW: Pre-computed temporal dimensions
    - analytics-fact-table-date-info
    # NEW: Flat dimension structure
    - analytics-optimized-dimensions
    # NEW: Hybrid optimized schema
    - analytics-complete-fact-table
    # NEW: Fact table column naming best practices (data → dimensions)
    - analytics-column-naming-convention
    # FraiseQL Roadmap Phases 8.6-8.10:
    # Advanced Query Features Phase 8.6
    - advanced-query-features
    - window-functions-performance
    - query-optimization-hints
    - prepared-statements-caching
    # Streaming Enhancements Phase 8.7
    - streaming-backpressure-handling
    - adaptive-chunking-memory
    - stream-pause-resume
    - multi-query-orchestration
    # Connection Pooling Phase 8.8
    - connection-pool-management
    - pool-health-checking
    - connection-reuse-optimization
    - pool-statistics-monitoring
    # Performance Optimization Phase 8.9
    - query-plan-caching
    - result-materialization-strategies
    - compression-optimization
    - zero-copy-optimizations
    # Error Handling Phase 8.10
    - retry-policies-backoff
    - circuit-breaker-pattern
    - graceful-degradation
    - error-recovery-strategies
    # Future patterns:
    # - cqrs
    # - dataloader-pattern
    # - pagination
    # - soft-deletes

  # Blog post types
  types:
    - tutorial
    - troubleshooting
    - reference

  # Audience depths
  depths:
    - beginner
    - intermediate
    - advanced

  # Framework comparisons to generate
  comparisons:
    - frameworks: [postgraphile, apollo-server]
      patterns: [trinity-pattern, n-plus-one]

    - frameworks: [strawberry, graphene]
      patterns: [trinity-pattern, n-plus-one]

    - frameworks: [spring-graphql, quarkus-graphql]
      patterns: [trinity-pattern]

    - frameworks: [hot-chocolate, graphql-net]
      patterns: [trinity-pattern]

    # FraiseQL comparisons (compiled vs interpreted)
    - frameworks: [fraiseql, apollo-server]
      patterns: [compiled-graphql-execution, sql-generation-optimization]
      focus: "compiled vs interpreted execution"

    - frameworks: [fraiseql, postgraphile]
      patterns: [streaming-json-results, sql-generation-optimization]
      focus: "database-first approaches with streaming"

    - frameworks: [fraiseql, strawberry]
      patterns: [compiled-graphql-execution]
      focus: "performance: compiled Rust vs interpreted Python"

    # Analytics-specific comparisons
    - frameworks: [fraiseql, apollo-server]
      patterns: [analytics-schema-conventions, analytics-fact-table-date-info]
      focus: "analytics performance: compiled GraphQL vs traditional"

    - frameworks: [fraiseql, postgraphile]
      patterns: [analytics-optimized-dimensions, analytics-complete-fact-table]
      focus: "analytics at scale: FraiseQL vs database-first"

  # Model assignment for different content types
  model_assignment:
    tutorial:
      beginner: opencode      # Simple, free tier works well
      intermediate: opencode  # Still straightforward
      advanced: claude-code   # Needs nuance and depth

    comparison:
      all: claude-code        # Needs judgment for fair comparison

    troubleshooting:
      beginner: opencode
      intermediate: opencode
      advanced: claude-code   # Complex debugging guidance

    reference:
      all: vllm               # Structured output, repetitive

    # FraiseQL-specific patterns require Claude for nuance
    compiled-graphql-execution:
      beginner: opencode
      intermediate: claude-code  # Architecture understanding needed
      advanced: claude-code      # Compiler internals

    sql-generation-optimization:
      beginner: vllm          # Structured reference material
      intermediate: claude-code  # Strategic SQL decisions
      advanced: claude-code      # Advanced optimization

    streaming-json-results:
      beginner: opencode
      intermediate: opencode
      advanced: claude-code   # fraiseql-wire internals

    # Analytics patterns - enriched with date_info and dimensions
    analytics-schema-conventions:
      beginner: opencode      # Table naming basics
      intermediate: opencode  # Column structure and indexing
      advanced: claude-code   # Compiler introspection

    analytics-fact-table-date-info:
      beginner: opencode      # What and why pre-compute
      intermediate: claude-code  # Implementation strategy
      advanced: claude-code   # Performance optimization (7-10x speedup)

    analytics-optimized-dimensions:
      beginner: opencode      # Flat vs nested structure
      intermediate: opencode  # Design patterns and naming
      advanced: claude-code   # Complex multi-dimension scenarios

    analytics-complete-fact-table:
      beginner: opencode      # Overview of hybrid approach
      intermediate: claude-code  # Architecture design
      advanced: claude-code   # Performance profiling and scaling

    analytics-column-naming-convention:
      beginner: opencode      # Why naming matters for schemas
      intermediate: opencode  # Best practices and examples
      advanced: claude-code   # Migration strategy and trade-offs

    # Phases 8.6-8.10 Roadmap Patterns
    # Phase 8.6: Advanced Query Features
    advanced-query-features:
      beginner: opencode      # Introduction to window functions
      intermediate: claude-code  # Window function implementation
      advanced: claude-code   # Complex query optimization

    window-functions-performance:
      beginner: opencode      # What are window functions
      intermediate: opencode  # Common window function patterns
      advanced: claude-code   # Performance tuning window queries

    query-optimization-hints:
      beginner: vllm          # Hint syntax reference
      intermediate: claude-code  # When and how to use hints
      advanced: claude-code   # Optimizer internals

    prepared-statements-caching:
      beginner: opencode      # Prepared statement basics
      intermediate: opencode  # Statement pooling strategies
      advanced: claude-code   # Cache coherency and performance

    # Phase 8.7: Streaming Enhancements
    streaming-backpressure-handling:
      beginner: opencode      # Backpressure concepts
      intermediate: claude-code  # Implementation patterns
      advanced: claude-code   # Advanced backpressure scenarios

    adaptive-chunking-memory:
      beginner: opencode      # Memory pressure concepts
      intermediate: claude-code  # Adaptive chunking algorithm
      advanced: claude-code   # Memory profiling and optimization

    stream-pause-resume:
      beginner: opencode      # Pause/resume API
      intermediate: opencode  # State management patterns
      advanced: claude-code   # Complex pause scenarios

    multi-query-orchestration:
      beginner: opencode      # Multi-query basics
      intermediate: claude-code  # Resource allocation
      advanced: claude-code   # Concurrent optimization

    # Phase 8.8: Connection Pooling
    connection-pool-management:
      beginner: opencode      # Pool concepts and configuration
      intermediate: opencode  # Pool sizing and tuning
      advanced: claude-code   # Advanced pool strategies

    pool-health-checking:
      beginner: opencode      # Health check types
      intermediate: opencode  # Health check configuration
      advanced: claude-code   # Failure detection patterns

    connection-reuse-optimization:
      beginner: opencode      # Connection reuse basics
      intermediate: opencode  # Optimization techniques
      advanced: claude-code   # Performance profiling

    pool-statistics-monitoring:
      beginner: vllm          # Monitoring metrics reference
      intermediate: opencode  # Dashboard setup
      advanced: claude-code   # Advanced diagnostics

    # Phase 8.9: Performance Optimization
    query-plan-caching:
      beginner: opencode      # Query plan caching concepts
      intermediate: claude-code  # Cache implementation
      advanced: claude-code   # Cache coherency and invalidation

    result-materialization-strategies:
      beginner: opencode      # Materialization overview
      intermediate: opencode  # Strategy selection
      advanced: claude-code   # Memory-efficient materialization

    compression-optimization:
      beginner: vllm          # Compression algorithm reference
      intermediate: opencode  # When to use compression
      advanced: claude-code   # Compression performance tuning

    zero-copy-optimizations:
      beginner: opencode      # Zero-copy concepts
      intermediate: claude-code  # Implementation techniques
      advanced: claude-code   # Memory architecture optimization

    # Phase 8.10: Error Handling
    retry-policies-backoff:
      beginner: opencode      # Retry policy basics
      intermediate: opencode  # Exponential backoff patterns
      advanced: claude-code   # Adaptive retry strategies

    circuit-breaker-pattern:
      beginner: opencode      # Circuit breaker concept
      intermediate: opencode  # Implementation patterns
      advanced: claude-code   # Circuit breaker tuning

    graceful-degradation:
      beginner: opencode      # Degradation strategies
      intermediate: opencode  # Fallback implementation
      advanced: claude-code   # Partial result handling

    error-recovery-strategies:
      beginner: opencode      # Recovery basics
      intermediate: opencode  # Common recovery patterns
      advanced: claude-code   # Complex recovery scenarios

# ============================================================
# SQL GENERATION MATRIX
# ============================================================
sql_generation:
  # Dataset sizes to generate
  sizes:
    - xs
    - medium
    - large

  # Output locations
  output:
    xs: "database/03-data-xs.sql"
    medium: "database/03-data-medium.sql"
    large: "database/03-data-large.sql"

# ============================================================
# FRAMEWORK COVERAGE
# ============================================================
frameworks:
  # All 26 frameworks in VelocityBench
  all:
    - postgraphile
    - fraiseql
    - apollo-server
    - graphql-yoga
    - fastify-graphql
    - express-graphql
    - mercurius
    - strawberry
    - graphene
    - ariadne
    - asgi-graphql
    - rails
    - hanami
    - spring-graphql
    - micronaut-graphql
    - quarkus-graphql
    - play-graphql
    - hot-chocolate
    - entity-framework-core
    - graphql-net
    - gqlgen
    - graphql-go
    - graphql-core-php
    - webonyx-graphql-php
    - async-graphql
    - juniper

  # Frameworks by language (for language-specific posts)
  by_language:
    javascript:
      - postgraphile
      - apollo-server
      - graphql-yoga
      - fastify-graphql
      - express-graphql
      - mercurius

    python:
      - strawberry
      - graphene
      - ariadne
      - asgi-graphql

    ruby:
      - rails
      - hanami

    java:
      - spring-graphql
      - micronaut-graphql
      - quarkus-graphql
      - play-graphql

    csharp:
      - hot-chocolate
      - entity-framework-core
      - graphql-net

    go:
      - gqlgen
      - graphql-go

    php:
      - graphql-core-php
      - webonyx-graphql-php

    rust:
      - async-graphql
      - juniper
      - fraiseql
      - fraiseql-wire

    custom:
      - fraiseql

# ============================================================
# GENERATION STATISTICS (EXPECTED)
# ============================================================
expected_output:
  blog_posts:
    # Per pattern: 3 types × 3 depths = 9 posts (reference has 1 depth)
    # = 3 + 3 + 1 = 7 posts per pattern
    per_pattern: 7

    # Comparisons: each generates 1 post
    comparisons: 4

    # With 2 patterns currently:
    # 2 patterns × 7 posts = 14
    # + 4 comparisons = 4
    # Total: 18 blog posts (with current patterns)

    # With 50 patterns:
    # 50 patterns × 7 = 350 posts
    # + 325 comparisons (26 choose 2) × 3 depths = 975
    # Total: 1,325+ blog posts

  sql_files:
    count: 3
    sizes: [xs, medium, large]

# ============================================================
# AUTOMATION HINTS
# ============================================================
automation:
  # Run order for full generation
  sequence:
    - "Generate SQL files first (needed for testing)"
    - "Generate blog prompts"
    - "Use opencode for bulk generation"
    - "Use Claude Code for quality review"

  # CI/CD integration
  ci_commands:
    generate_sql: "python generator/generate_sql.py --size xs"
    generate_prompts: "python generator/generate_blog_prompt.py --pattern trinity-pattern --all-types --all-depths"
    validate: "python generator/validate_corpus.py"

  # Parallelization hints
  parallel_safe:
    - sql_generation      # Each size independent
    - prompt_generation   # Each pattern independent
  not_parallel_safe:
    - blog_generation     # API rate limits
