# Database Indexing Strategies
# VelocityBench Knowledge Corpus

id: database-indexing
name: "Database Indexing Strategies"
category: performance
type: pattern
severity: high
tags:
  - database
  - performance
  - indexing
  - postgresql
  - optimization

summary:
  short: "Use indexes to dramatically speed up database queries"
  long: |
    Indexes are data structures that allow the database to find rows without scanning
    the entire table. A well-designed index can turn a 10-second query into a 10ms query.
    PostgreSQL supports multiple index types (B-tree, Hash, GIN, GiST, BRIN) each optimized
    for different query patterns. Understanding when and how to use each type is essential
    for database performance.

problem:
  description: |
    Without indexes, the database must perform a sequential scan (reading every row) to
    find matching data. As tables grow, query performance degrades linearly. A table with
    10 million rows takes 10x longer than a table with 1 million rows. Indexes provide
    O(log n) lookup time, making queries nearly constant-time regardless of table size.

  symptoms:
    - name: "Slow queries"
      description: "SELECT queries taking seconds or minutes"
      detection: "EXPLAIN ANALYZE shows Seq Scan on large tables"

    - name: "High CPU usage"
      description: "Database server CPU constantly high"
      detection: "pg_stat_statements shows queries scanning many rows"

    - name: "Lock contention"
      description: "Write operations blocking reads"
      detection: "pg_stat_activity shows waiting queries"

solution:
  principle: "Create indexes on columns used in WHERE, JOIN, and ORDER BY clauses"

  components:
    - name: "B-tree Index"
      type: "default"
      purpose: "General-purpose, supports equality and range queries"

    - name: "Hash Index"
      type: "specialized"
      purpose: "Fast equality lookups only"

    - name: "GIN Index"
      type: "specialized"
      purpose: "Full-text search, JSONB, arrays"

    - name: "GiST Index"
      type: "specialized"
      purpose: "Geometric data, range types, full-text"

    - name: "BRIN Index"
      type: "specialized"
      purpose: "Very large tables with naturally ordered data"

index_types:
  - name: "B-tree"
    operators: ["=", "<", ">", "<=", ">=", "BETWEEN", "IN", "IS NULL"]
    example: |
      -- Most common index type
      CREATE INDEX idx_users_email ON users(email);
      CREATE INDEX idx_orders_created ON orders(created_at);

      -- Composite index for multiple columns
      CREATE INDEX idx_orders_user_status ON orders(user_id, status);

  - name: "Partial Index"
    description: "Index only rows matching a condition"
    example: |
      -- Only index active users (smaller, faster index)
      CREATE INDEX idx_users_active_email ON users(email)
      WHERE status = 'active';

      -- Only index recent orders
      CREATE INDEX idx_orders_recent ON orders(created_at)
      WHERE created_at > '2024-01-01';

  - name: "Expression Index"
    description: "Index computed values"
    example: |
      -- Index lowercase email for case-insensitive search
      CREATE INDEX idx_users_email_lower ON users(LOWER(email));

      -- Index JSONB field
      CREATE INDEX idx_users_metadata_country ON users((metadata->>'country'));

  - name: "GIN for JSONB"
    operators: ["@>", "?", "?&", "?|"]
    example: |
      -- Index all JSONB keys and values
      CREATE INDEX idx_users_metadata ON users USING GIN(metadata);

      -- Query: Find users in USA
      SELECT * FROM users WHERE metadata @> '{"country": "USA"}';

  - name: "GIN for Full-Text"
    example: |
      -- Full-text search index
      CREATE INDEX idx_posts_search ON posts
      USING GIN(to_tsvector('english', title || ' ' || body));

      -- Query with full-text search
      SELECT * FROM posts
      WHERE to_tsvector('english', title || ' ' || body) @@ to_tsquery('postgresql & performance');

  - name: "BRIN"
    description: "Block Range Index for large, ordered tables"
    example: |
      -- Efficient for time-series data
      CREATE INDEX idx_events_timestamp ON events USING BRIN(timestamp);

      -- Much smaller than B-tree, good for append-only tables

best_practices:
  - "Don't index everything - each index slows down writes"
  - "Use EXPLAIN ANALYZE to verify indexes are being used"
  - "Consider partial indexes for filtered queries"
  - "Composite indexes: put most selective column first"
  - "Monitor pg_stat_user_indexes for unused indexes"
  - "Rebuild indexes periodically with REINDEX"

anti_patterns:
  - name: "Over-indexing"
    description: "Creating indexes on every column"
    impact: "Slow writes, wasted disk space"

  - name: "Wrong column order"
    description: "Composite index with least selective column first"
    impact: "Index not used efficiently"

  - name: "Indexing low-cardinality columns"
    description: "Index on boolean or status columns alone"
    impact: "Index scan slower than sequential scan"

blog_hooks:
  beginner:
    analogy: |
      Think of a book's index:
      - Without index: Read every page to find "PostgreSQL" mentions
      - With index: Look up "PostgreSQL" in back, go directly to page 42
      Database indexes work the same way - they're lookup tables for your data.

  intermediate:
    focus: "Choosing the right index type"
    key_points:
      - "EXPLAIN ANALYZE to understand query plans"
      - "Composite indexes and column ordering"
      - "Partial indexes for filtered queries"
      - "GIN vs GiST for JSONB and full-text"

  advanced:
    focus: "Index maintenance and advanced patterns"
    key_points:
      - "BRIN for time-series at scale"
      - "Covering indexes (INCLUDE clause)"
      - "Index-only scans and visibility maps"
      - "Concurrent index creation"
      - "Index bloat and REINDEX strategies"
