best_practices:
  - name: "Use consistent hashing for percentage rollout"
    description: "Same user always sees same variant"
    reason: "Prevents 'flickering' - user switches variants"

  - name: "Default to false for new flags"
    description: "Feature disabled by default"
    benefit: "Safe - accidental deploy doesn't enable unwanted features"

  - name: "Clean up old flags"
    description: "Remove flags once feature is stable"
    timeline: "Remove when 100% rolled out for 2+ weeks"
    benefit: "Reduces cognitive load, improves performance"

  - name: "Monitor flag performance"
    description: "Track metrics for each flag variant"
    metrics:
      - "Error rate per variant"
      - "Latency per variant"
      - "User impact"

  - name: "Have kill switch"
    description: "Instant disable if issues found"
    benefit: "Fast rollback without redeployment"

patterns:
  - name: "Gradual Rollout"
    purpose: "Risk-managed feature release"
    process: |
      1. Deploy with flag disabled
      2. Enable for 1%
      3. Monitor for 1 hour
      4. 5% if OK, else rollback
      5. 25%, 50%, 100% similarly

  - name: "Internal Flag"
    purpose: "QA/internal testing before rollout"
    example: |
      INTERNAL_USERS = ['qa@company.com', 'dev@company.com']

      if is_internal_user(user.email):
          features_to_test = [
              'new_checkout',
              'premium_features'
          ]
      else:
          features_to_test = []

  - name: "Ops-Driven Kill Switch"
    purpose: "Production ops can disable feature"
    benefit: |
      - No redeploy needed
      - Instant response to issues
      - Ops empowered without code changes

comparison:
  commercial: |
    LaunchDarkly: $$$, full-featured, managed
    Split.io: $$, experimentation focus
    Contlo: $$, mobile focus

  open_source: |
    Unleash: Self-hosted, good features
    Flagsmith: Self-hosted, growing
    GrowthBook: Focus on experiments

