# Infrastructure as Code (IaC)
# VelocityBench Knowledge Corpus

id: infrastructure-as-code
name: "Infrastructure as Code with Terraform and Pulumi"
category: infrastructure
type: pattern
severity: high
tags:
  - infrastructure-as-code
  - terraform
  - pulumi
  - devops
  - automation

summary:
  short: "Define and manage infrastructure with code instead of manual clicks"
  long: |
    Infrastructure as Code (IaC) treats infrastructure like software - versioned, tested,
    automated. Terraform uses declarative language (HCL) and state files. Pulumi uses
    programming languages (Python, Go, TypeScript) for more flexibility. Both enable
    reproducible deployments, easy scaling, disaster recovery, and infrastructure
    versioning alongside application code.

problem:
  description: |
    Manual infrastructure management creates problems:
    - Configuration drift (manual changes diverge from intended)
    - Difficult to reproduce environments
    - Error-prone manual deployments
    - No audit trail of infrastructure changes
    - Difficult disaster recovery
    - Hard to test infrastructure changes

  symptoms:
    - name: "Configuration drift"
      description: "Dev/prod environments diverge over time"
      detection: "Manual changes no one remembers"

    - name: "Disaster recovery takes hours"
      description: "Rebuilding requires manual steps"
      detection: "Outage lasts until sysadmin recreates infrastructure"

    - name: "Deployment failures"
      description: "Manual steps miss edge cases"
      detection: "Deployments fail sporadically"

solution:
  principle: "Version infrastructure like code, deploy automatically"

  components:
    - name: "IaC Definition"
      type: "code"
      purpose: "Declares desired infrastructure state"

    - name: "State Management"
      type: "tracking"
      purpose: "Tracks current vs desired state"

    - name: "Automation"
      type: "deployment"
      purpose: "Applies changes automatically"

    - name: "Versioning"
      type: "git"
      purpose: "Track infrastructure changes over time"

implementation:
  terraform_basics:
    installation: |
      # Download Terraform
      https://www.terraform.io/downloads

      # Verify
      terraform version

    simple_aws_deployment: |
      # main.tf
      terraform {
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
      }

      provider "aws" {
        region = "us-east-1"
      }

      # Create security group
      resource "aws_security_group" "api" {
        name = "api-sg"

        ingress {
          from_port   = 80
          to_port     = 80
          protocol    = "tcp"
          cidr_blocks = ["0.0.0.0/0"]
        }

        ingress {
          from_port   = 443
          to_port     = 443
          protocol    = "tcp"
          cidr_blocks = ["0.0.0.0/0"]
        }

        egress {
          from_port   = 0
          to_port     = 0
          protocol    = "-1"
          cidr_blocks = ["0.0.0.0/0"]
        }
      }

      # Create EC2 instance
      resource "aws_instance" "api_server" {
        ami           = "ami-0c55b159cbfafe1f0"  # Amazon Linux 2
        instance_type = "t3.medium"
        key_name      = aws_key_pair.deployer.key_name

        vpc_security_group_ids = [aws_security_group.api.id]

        user_data = base64encode(file("${path.module}/init.sh"))

        tags = {
          Name = "api-server"
        }
      }

      # Create RDS database
      resource "aws_db_instance" "postgres" {
        identifier     = "myapp-db"
        engine         = "postgres"
        engine_version = "15.3"
        instance_class = "db.t3.micro"
        allocated_storage = 20

        db_name  = "myapp"
        username = "admin"
        password = random_password.db_password.result

        skip_final_snapshot = true

        tags = {
          Name = "myapp-database"
        }
      }

      # Outputs
      output "api_server_ip" {
        value = aws_instance.api_server.public_ip
      }

      output "database_endpoint" {
        value = aws_db_instance.postgres.endpoint
      }

    deployment_workflow: |
      # 1. Initialize Terraform
      terraform init

      # 2. Validate configuration
      terraform validate

      # 3. Plan changes
      terraform plan -out=tfplan

      # 4. Review and apply
      terraform apply tfplan

      # 5. Destroy when done (for dev)
      terraform destroy

    state_management: |
      # terraform.tfstate tracks current state
      # IMPORTANT: Store securely (git-ignore, remote backend)

      # Remote backend (AWS S3)
      terraform {
        backend "s3" {
          bucket         = "my-tf-state"
          key            = "prod/terraform.tfstate"
          region         = "us-east-1"
          encrypt        = true
          dynamodb_table = "terraform-locks"
        }
      }

      # DynamoDB table prevents concurrent modifications

  pulumi_basics:
    installation: |
      # Install Pulumi
      curl -fsSL https://get.pulumi.com | sh

      # Create new project
      pulumi new aws-python
      cd my-infrastructure

    python_deployment: |
      # __main__.py
      import pulumi
      import pulumi_aws as aws
      import pulumi_awsx as awsx

      # Create VPC
      vpc = aws.ec2.Vpc("main",
          cidr_block="10.0.0.0/16"
      )

      # Create subnet
      subnet = aws.ec2.Subnet("main",
          vpc_id=vpc.id,
          cidr_block="10.0.1.0/24"
      )

      # Security group
      security_group = aws.ec2.SecurityGroup("api",
          vpc_id=vpc.id,
          ingress=[
              aws.ec2.SecurityGroupIngressArgs(
                  protocol="tcp",
                  from_port=80,
                  to_port=80,
                  cidr_blocks=["0.0.0.0/0"],
              ),
              aws.ec2.SecurityGroupIngressArgs(
                  protocol="tcp",
                  from_port=443,
                  to_port=443,
                  cidr_blocks=["0.0.0.0/0"],
              ),
          ]
      )

      # RDS database
      db = aws.rds.Instance("postgres",
          allocated_storage=20,
          storage_type="gp2",
          engine="postgres",
          engine_version="15.3",
          instance_class="db.t3.micro",
          db_name="myapp",
          username="admin",
          password="password123",  # Use random_password in prod!
          skip_final_snapshot=True,
      )

      # Export outputs
      pulumi.export("db_endpoint", db.endpoint)

    deployment_workflow: |
      # 1. Create/select stack
      pulumi stack init production

      # 2. Configure settings
      pulumi config set aws:region us-east-1

      # 3. Preview changes
      pulumi preview

      # 4. Deploy
      pulumi up

      # 5. Check outputs
      pulumi stack output db_endpoint

      # 6. Destroy
      pulumi destroy

  terraform_vs_pulumi:
    terraform_pros:
      - "Declarative (simpler model)"
      - "No code compilation"
      - "Large community/examples"
      - "Multi-language provider support"

    terraform_cons:
      - "HCL language only"
      - "Less flexible logic"
      - "State management complexity"

    pulumi_pros:
      - "Real programming languages (Python, Go, TypeScript)"
      - "More flexible logic"
      - "Familiar IDE/debugging"
      - "Code reuse via libraries"

    pulumi_cons:
      - "Steeper learning curve"
      - "Smaller community"
      - "Runtime overhead"

best_practices:
  - name: "Store state remotely and securely"
    description: "Never commit state to Git"
    action: |
      terraform {
        backend "s3" {
          encrypt = true
          bucket  = "terraform-state"
        }
      }

  - name: "Use modules for code reuse"
    description: "Create reusable infrastructure components"
    example: |
      # modules/rds/main.tf
      resource "aws_db_instance" "postgres" { ... }

      # main.tf
      module "database" {
        source = "./modules/rds"
        db_name = "myapp"
      }

  - name: "Separate environments"
    description: "Dev, staging, prod with different configs"
    structure: |
      terraform/
      ├── environments/
      │   ├── dev/
      │   ├── staging/
      │   └── prod/
      └── modules/

  - name: "Review all changes before applying"
    description: "Use plan to review, then apply"
    workflow: |
      terraform plan -out=tfplan
      # Review output
      terraform apply tfplan

  - name: "Version lock dependencies"
    description: "Prevent unexpected provider changes"
    example: |
      terraform {
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"  # Pin major version
          }
        }
      }

patterns:
  - name: "GitOps"
    description: "Git is source of truth for infrastructure"
    workflow: |
      1. Commit terraform changes to Git
      2. CI/CD pipeline runs terraform plan
      3. Pull request for review
      4. Approval triggers terraform apply
      5. Changes deployed automatically

  - name: "Environment Promotion"
    description: "Code promotion: dev → staging → prod"
    workflow: |
      terraform/ (single source of truth)
      ├── dev.tfvars
      ├── staging.tfvars
      └── prod.tfvars

      # Deploy to different environments
      terraform apply -var-file="dev.tfvars"

  - name: "Testing Infrastructure"
    description: "Write tests for infrastructure code"
    tools:
      - "Terratest (Go testing framework)"
      - "Checkov (policy as code)"
      - "tflint (linting)"

blog_hooks:
  beginner:
    analogy: |
      IaC is like cooking with a recipe:
      - Manual: Remember steps from memory (inconsistent)
      - IaC: Written recipe (reproducible every time)
      Even better: Version recipe in Git and share with team!

  intermediate:
    focus: "Terraform basics and state management"
    key_points:
      - "Terraform plan and apply workflow"
      - "State files and remote backends"
      - "Creating reusable modules"
      - "Managing multiple environments"

  advanced:
    focus: "Advanced patterns and automation"
    key_points:
      - "GitOps with IaC"
      - "Testing infrastructure"
      - "Policy as Code (Sentinel, OPA)"
      - "Scaling infrastructure management"
