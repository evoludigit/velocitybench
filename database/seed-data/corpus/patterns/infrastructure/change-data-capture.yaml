best_practices:
  - name: "Use log-based CDC for critical systems"
    description: "Log-based CDC is more reliable than polling"
    rationale: "No missed changes, real-time, low impact"

  - name: "Handle exactly-once semantics"
    description: "Ensure no duplicate or lost changes"
    approach: |
      - Idempotent consumer processing
      - Track processed offsets
      - Handle out-of-order messages

  - name: "Version change schemas"
    description: "Schema evolution causes breaks"
    approach: |
      - Use schema registry (Confluent)
      - Version change messages
      - Support multiple schema versions in consumers

  - name: "Monitor lag"
    description: "Track how far behind consumers are"
    metrics:
      - "Consumer offset vs producer offset"
      - "Time to process changes"
      - "Alert if lag exceeds threshold"

comparison:
  - name: "Debezium vs Custom CDC"
    debezium_pros:
      - "Battle-tested, widely used"
      - "Supports many databases"
      - "Handles edge cases"
      - "Community support"
    debezium_cons:
      - "Additional infrastructure"
      - "Kafka/message queue required"
    custom_pros:
      - "Simpler setup for specific database"
      - "Fewer moving parts"
    custom_cons:
      - "Bugs from home-grown code"
      - "Hard to maintain"

blog_hooks:
  beginner:
    analogy: |
      CDC is like a mail subscription service:
      - No CDC: You check the mailbox every day (polling)
      - CDC: Mail is automatically delivered when it arrives
      The mail carrier (CDC) handles delivery for you!

  intermediate:
    focus: "Setting up Debezium with PostgreSQL and Kafka"
    key_points:
      - "Enabling logical decoding in PostgreSQL"
      - "Debezium connector configuration"
      - "Consuming changes from Kafka"
      - "Handling schema evolution"

  advanced:
    focus: "CDC at scale and architecture patterns"
    key_points:
      - "Multi-table consistency"
      - "Handling transactional boundaries"
      - "Scale to millions of changes/second"
      - "Building CQRS from CDC"
