trade_off_summary:
  consistency_vs_performance: |
    JSONB Composition (FraiseQL): Strong consistency, good performance (45ms)
    Redis Caching: Weak consistency (stale), best performance (2ms hits)

    FraiseQL sacrificed peak performance for strong consistency.
    This is a deliberate, defensible choice for production systems.

  schema_complexity_vs_flexibility: |
    JSONB Composition: Complex schema, fixed queries
    DataLoader: Simple schema, flexible queries

    FraiseQL chose predictability over flexibility.

  storage_vs_performance: |
    JSONB Composition: 2.0MB (duplication overhead)
    DataLoader: 1.2MB (normalized only)

    FraiseQL trades 67% more storage for single-query guarantees.

recommendations:
  - "Use FraiseQL's JSONB approach for read-heavy, stable data"
  - "For write-heavy or dynamic data, consider DataLoader instead"
  - "Use caching as a supplement, not replacement (invalidation is hard)"
  - "Measure your actual query patterns before choosing"
  - "Consider eventual consistency for non-critical data (analytics)"
  - "Refresh materialized views during low-traffic windows"

