    approach_3:
      name: "DataLoader Batching"
      query_count: 2
      total_latency: "23ms (1 users + 1 batched)"
      p99_latency: "67ms"
      database_size: "1.2MB (normalized)"
      memory_peak: "22MB (per-request state)"
      write_latency_hit: "None (schema unchanged)"
      consistency: "Strong (per-request)"
      client_complexity: "High (async, DataLoader required)"
      note: "Requires careful implementation"

    approach_4:
      name: "Redis Caching"
      query_count: "1-2 (70% hits, 30% miss)"
      hit_latency: "2ms"
      miss_latency: "18ms"
      p99_latency: "75ms (cache misses)"
      database_size: "1.2MB"
      memory_peak: "800MB+ (Redis for 10k users)"
      write_latency_hit: "HIGH (invalidation complex)"
      consistency: "Weak (stale 5-30 min)"
      client_complexity: "Medium (cache key strategy)"
      note: "Expensive memory, invalidation headaches"

  recommendation: |
    **For read-heavy, relatively stable data**: JSONB Composition wins (FraiseQL choice)
    - Single query, strong consistency, predictable performance
    - Tradeoff: Storage overhead, update complexity

    **For aggregations only**: Materialized Views
    - Fast, simple, eventual consistency acceptable

    **For dynamic queries**: DataLoader Batching
    - Flexible, no schema changes, requires discipline

    **For highest throughput with acceptable staleness**: Redis Caching
    - Lowest query latency, but high operational overhead

decision_matrix:
  write_frequency:
    question: "What is your write frequency?"
    answer_low: "Low (< 10 writes/second) → JSONB Composition"
    answer_high: "High (> 100 writes/second) → DataLoader or Caching"

  consistency:
    question: "How critical is consistency?"
    answer_critical: "Critical (financial, medical) → JSONB Composition"
    answer_best_effort: "Best-effort (analytics, UX) → Caching"

  query_predictability:
    question: "How predictable are queries?"
    answer_predictable: "Predictable (known access patterns) → JSONB Composition"
    answer_unpredictable: "Unpredictable (dynamic, ad-hoc) → DataLoader"

  storage_capacity:
    question: "How much storage capacity?"
    answer_plenty: "Plenty (OK with 2x database) → JSONB Composition"
    answer_constrained: "Constrained → DataLoader"

  single_query_performance:
    question: "How critical is single-query performance?"
    answer_critical: "Very (real-time dashboards) → JSONB Composition"
    answer_acceptable: "OK with 2 queries → DataLoader"

