  setting:
    database_pool_size: "Number of concurrent connections"
    database_max_overflow: "Additional connections for spikes"
    auto_camel_case: "Field name conversion"
    introspection_policy: "Schema query permission"
    enable_playground: "GraphQL playground UI"
    max_query_depth: "Maximum nesting depth"

  development:
    database_pool_size: "5"
    database_max_overflow: "5"
    auto_camel_case: "True"
    introspection_policy: "PUBLIC"
    enable_playground: "True"
    max_query_depth: "10"

  production:
    database_pool_size: "20"
    database_max_overflow: "10"
