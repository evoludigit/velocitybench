recommendation_matrix:
  - setting: "database_pool_size"
    development: "5"
    production: "20-50"
    reasoning: "Development: low concurrency | Production: scale to concurrent users"

  - setting: "introspection_policy"
    development: "PUBLIC"
    production: "DISABLED"
    reasoning: "Protect schema in production"

  - setting: "enable_playground"
    development: "True"
    production: "False"
    reasoning: "Debug locally, lock down production"

  - setting: "max_query_depth"
    development: "10"
    production: "10"
    reasoning: "Consistent limit; prevent expensive queries"

blog_hooks:
  beginner:
    analogy: |
      Configuration is like restaurant settings:
      - Kitchen size (pool_size) = number of chefs who can cook simultaneously
      - Backup chefs (max_overflow) = additional chefs for rush hours
      - Rules (max_query_depth) = prevent customer orders too complex to cook

      Wrong settings = chaos; right settings = smooth operation!

    focus: "Why configuration matters and what settings do"
    key_points:
      - "pool_size = concurrent requests (not total users)"
      - "auto_camel_case converts field names automatically"
      - "Disable playground/introspection in production"
      - "max_query_depth prevents expensive queries"

  intermediate:
    focus: "Environment-specific configuration"
    key_points:
      - "Development: permissive (playground, introspection enabled)"
      - "Production: restrictive (playground disabled, introspection disabled)"
      - "Use environment variables for secrets (DATABASE_URL)"
      - "Right-size pool for expected load"
      - "Monitor pool utilization; alert if exhausted"

  advanced:
    focus: "Production tuning and security hardening"
    key_points:
      - "Dynamic pool sizing based on load"
      - "Monitor connection pool metrics (active, waiting, size)"
      - "Separate DB credentials per environment"
      - "CORS whitelist prevents unauthorized origins"
      - "Query complexity limits prevent DoS attacks"
      - "Regular config audits (security, performance)"
