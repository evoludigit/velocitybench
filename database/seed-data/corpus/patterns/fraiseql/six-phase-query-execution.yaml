  consideration_2: Error handling across phases
  consideration_3: Observability in each phase
best_practices:
- name: Clear phases
  description: Each phase has single responsibility
- name: Phase boundaries
  description: Clear input/output contracts
- name: Observability
  description: Instrument each phase
anti_patterns:
- name: Mixed phases
  consequence: Hard to understand execution
- name: No instrumentation
  consequence: Can't debug issues
