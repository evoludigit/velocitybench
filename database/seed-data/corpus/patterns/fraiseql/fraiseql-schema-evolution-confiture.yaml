    key_points:
      - "Python types define schema (single source of truth)"
      - "DDL generation creates SQL from types"
      - "Fresh database: build from DDL (fast)"
      - "Existing database: apply migrations (safe)"

  intermediate:
    focus: "Schema evolution and multi-environment config"
    key_points:
      - "Development: DDL-only for instant builds"
      - "Production: Migrations for safe evolution"
      - "Confiture detects changes and generates migrations"
      - "Validate migrations before production deploy"

  advanced:
    focus: "Zero-downtime deployments and complex changes"
    key_points:
      - "Multi-step migrations for zero-downtime"
      - "Custom migrations for non-standard changes"
      - "Schema validation and safety checks"
      - "Coordinate migrations with code deployments"
