  beginner:
    focus: "Understanding Trinity pattern and constraints"
    key_points:
      - "Trinity: id (internal), pk_* (public), identifier (readable)"
      - "UNIQUE prevents duplicates"
      - "FOREIGN KEY prevents orphaned records"
      - "NOT NULL makes fields required"

  intermediate:
    focus: "Transactions and isolation"
    key_points:
      - "Transactions: all or nothing"
      - "Isolation: repeatable read is usually right"
      - "Check constraints enforce business rules"
      - "Cascades: delete child records automatically"

  advanced:
    focus: "Concurrency and edge cases"
    key_points:
      - "Optimistic locking detects concurrent updates"
      - "Serializable isolation for race-sensitive operations"
      - "Deadlock handling and retry logic"
      - "Constraint violation handling in application"
