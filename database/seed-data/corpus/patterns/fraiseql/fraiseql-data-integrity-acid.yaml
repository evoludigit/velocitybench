id: fraiseql-data-integrity-acid
name: "FraiseQL Data Integrity and ACID Guarantees"
category: fraiseql
type: standard
tags:
  - fraiseql
  - data-integrity
  - acid
  - constraints
  - transactions

summary:
  short: "Ensuring data consistency through ACID transactions, database constraints, and the Trinity pattern"
  long: |
    FraiseQL leverages PostgreSQL's ACID guarantees and database constraints to ensure data
    consistency without application-level complexity. The Trinity pattern (pk_*/id/fk_*) combined with
    database-level constraints provides automatic enforcement of data integrity rules. Understanding
    how to use transactions, constraints, and the Trinity pattern prevents data corruption.

problem:
  description: |
    Data consistency problems occur when:
    - Duplicate emails allowed (no unique constraint)
    - Foreign key to non-existent user (no foreign key)
    - Partially updated related entities (no transaction)
    - Race conditions during concurrent updates
    - Type mismatches (email stored as integer)

    These require application-level logic to prevent, adding complexity and bugs.

  symptoms:
    - name: "Duplicate emails"
      description: "Two users with same email"
      detection: "Unique constraint missing"

    - name: "Orphaned records"
      description: "Post with fk_user pointing to non-existent user"
      detection: "Foreign key constraint missing"

    - name: "Partial updates"
      description: "User updated but post count not updated"
      detection: "Transaction didn't complete"

    - name: "Race conditions"
      description: "Two updates conflict, one silently overwrites"
      detection: "Concurrent updates cause data loss"

  impact: |
    Data corruption, inconsistency, hard-to-debug bugs, support burden

solution:
  principle: "Database-level constraints + ACID transactions + Trinity pattern"

  components:
    - name: "Trinity Pattern"
      type: "Schema pattern"
      purpose: "Three-tier identifier system for data integrity"
      pattern: |
        CREATE TABLE tb_user (
          id INTEGER PRIMARY KEY GENERATED BY DEFAULT AS IDENTITY,
          pk_user UUID UNIQUE DEFAULT gen_random_uuid(),
          identifier TEXT,
          -- Other columns
        );

      components:
        id: |
          **id (SERIAL PK)**
          - Internal database row ID
          - Small, efficient for joins
          - Sequential (reveals insert order)
          - Never exposed to clients

        pk_user: |
          **pk_* (UUID PK)**
          - Public UUID identifier
          - Exposed to clients/APIs
          - Non-sequential (doesn't reveal order)
          - Always unique (UNIQUE constraint)

        identifier: |
          **identifier (TEXT)**
          - Human-readable identifier
          - Examples: username, email, slug
          - Optional (can be NULL)
          - Usually unique (business rule)

      benefit: |
        - Foreign keys use pk_* (stable, non-sequential)
        - APIs expose pk_* (public IDs)
        - Internal queries use id (efficient)

    - name: "Unique Constraints"
      type: "Database constraint"
      purpose: "Prevent duplicate data"
      example: |
        CREATE TABLE tb_user (
          id INTEGER PRIMARY KEY,
          pk_user UUID UNIQUE,
          email TEXT UNIQUE,
          username TEXT UNIQUE,
          -- Allows NULL: email IS NULL doesn't violate uniqueness
        );

      enforcement: |
        -- This fails:
        INSERT INTO tb_user (email) VALUES ('alice@example.com');
        INSERT INTO tb_user (email) VALUES ('alice@example.com');  -- Error!

    - name: "Foreign Key Constraints"
      type: "Database constraint"
      purpose: "Ensure referential integrity"
      example: |
        CREATE TABLE tb_post (
          id INTEGER PRIMARY KEY,
          pk_post UUID UNIQUE,
          fk_author UUID NOT NULL REFERENCES tb_user(pk_user),
          -- Enforced: fk_author must point to existing tb_user
        );

      enforcement: |
        -- This fails:
        INSERT INTO tb_post (fk_author) VALUES ('nonexistent-uuid');  -- Error!

      cascades: |
        -- Delete user and cascade to posts
        CREATE TABLE tb_post (
          fk_author UUID REFERENCES tb_user(pk_user) ON DELETE CASCADE
        );
        DELETE FROM tb_user WHERE pk_user = user_id;
        -- All user's posts automatically deleted

    - name: "Check Constraints"
      type: "Database constraint"
      purpose: "Enforce business rules at database level"
      examples: |
        -- Email format
        ALTER TABLE tb_user ADD CONSTRAINT ck_user_email
        CHECK (email LIKE '%@%.%');

        -- Username length
        ALTER TABLE tb_user ADD CONSTRAINT ck_user_username
        CHECK (LENGTH(username) >= 3 AND LENGTH(username) <= 30);

        -- Non-negative counts
        ALTER TABLE tb_post ADD CONSTRAINT ck_post_view_count
        CHECK (view_count >= 0);

    - name: "NOT NULL Constraints"
      type: "Database constraint"
      purpose: "Enforce required fields"
      example: |
        CREATE TABLE tb_user (
          pk_user UUID NOT NULL,  -- Always required
          email TEXT NOT NULL,    -- Always required
          bio TEXT,               -- Optional (allows NULL)
        );

    - name: "ACID Transactions"
      type: "Database guarantee"
      purpose: "Atomic, Consistent, Isolated, Durable updates"
      pattern: |
        -- All or nothing
        BEGIN TRANSACTION;

        -- Step 1: Insert user
        INSERT INTO tb_user (email) VALUES ('alice@example.com');
        -- Step 2: Get user ID
        user_id := last_insert_id();
        -- Step 3: Create default post
        INSERT INTO tb_post (fk_author, title) VALUES (user_id, 'Welcome!');

        COMMIT;  -- Both succeed or both fail (atomic)

      benefit: |
        - Either all changes apply or none
        - No partial updates
        - Consistency guaranteed

    - name: "Isolation Levels"
      type: "Concurrency control"
      purpose: "Handle concurrent transactions"
      levels:
        read_committed: |
          **Read Committed** (default):
          - Other transactions only see committed data
          - Prevents dirty reads
          - Allows non-repeatable reads

        repeatable_read: |
          **Repeatable Read**:
          - Transaction sees consistent snapshot
          - Prevents non-repeatable reads
          - May have phantom reads

        serializable: |
          **Serializable**:
          - Transactions execute in order (no concurrency conflicts)
          - Prevents all anomalies
          - Slowest (most conflict detection)

    - name: "Optimistic Locking"
      type: "Application pattern"
      purpose: "Detect concurrent updates without blocking"
      pattern: |
        CREATE TABLE tb_post (
          version INTEGER DEFAULT 1,
          -- Increment on every update
        );

        -- Update only if version hasn't changed
        UPDATE tb_post
        SET title = %s, version = version + 1
        WHERE pk_post = %s AND version = %s
        RETURNING version;
        -- Fails (0 rows) if another transaction updated meanwhile

key_concepts:
  concept_1: "Trinity pattern: id (internal), pk_* (public), identifier (human-readable)"
  concept_2: "Foreign keys enforce referential integrity automatically"
  concept_3: "Unique constraints prevent duplicates"
  concept_4: "Check constraints enforce business rules"
  concept_5: "ACID transactions ensure consistency"
  concept_6: "Isolation levels control concurrent update conflicts"
  concept_7: "Optimistic locking detects conflicts"
  concept_8: "Database constraints > Application-level validation"

best_practices:
  - name: "Use database constraints"
    description: "NOT NULL, UNIQUE, FOREIGN KEY, CHECK at database level"

  - name: "Design Trinity pattern carefully"
    description: "id (internal), pk_* (public), identifier (business key)"

  - name: "Use transactions for related updates"
    description: "Update user and default post in single transaction"

  - name: "Choose appropriate isolation level"
    description: "Repeatable read for most cases, serializable only if needed"

  - name: "Implement optimistic locking"
    description: "Detect updates on mutable entities"

  - name: "Cascade deletes carefully"
    description: "ON DELETE CASCADE useful, but be aware of implications"

  - name: "Test edge cases"
    description: "Concurrent updates, constraint violations, cascades"

anti_patterns:
  - name: "No unique constraints"
    description: "Allow duplicate emails, usernames"
    consequence: "Data corruption, application bugs"
    fix: "Add UNIQUE constraints"

  - name: "No foreign keys"
    description: "Allow orphaned posts (fk_user = NULL)"
    consequence: "Orphaned data, referential integrity violations"
    fix: "Add FOREIGN KEY constraints"

  - name: "No transactions"
    description: "Update user and post separately"
    consequence: "Partial updates if failure between operations"
    fix: "Wrap related operations in transaction"

  - name: "Wrong isolation level"
    description: "Use READ COMMITTED for race-sensitive operations"
    consequence: "Concurrent updates cause data loss"
    fix: "Use REPEATABLE READ or SERIALIZABLE"

  - name: "Cascade deletes without care"
    description: "ON DELETE CASCADE deletes unintended data"
    consequence: "Data loss"
    fix: "Use ON DELETE RESTRICT, handle explicitly"

examples:
  example_1:
    title: "Trinity Pattern Schema"
    description: "Complete Trinity pattern implementation"
    code: |
      CREATE TABLE tb_user (
        -- Internal ID (efficient for joins)
        id INTEGER PRIMARY KEY GENERATED BY DEFAULT AS IDENTITY,
        -- Public UUID (exposed to API clients)
        pk_user UUID UNIQUE DEFAULT gen_random_uuid() NOT NULL,
        -- Human-readable identifier
        username TEXT UNIQUE,
        -- Required fields
        email TEXT UNIQUE NOT NULL,
        -- Constraints enforce consistency
        CONSTRAINT ck_user_email CHECK (email LIKE '%@%.%'),
        CONSTRAINT ck_user_username_length CHECK (
          username IS NULL OR (
            LENGTH(username) >= 3 AND LENGTH(username) <= 30
          )
        )
      );

      CREATE TABLE tb_post (
        id INTEGER PRIMARY KEY,
        pk_post UUID UNIQUE NOT NULL,
        -- Foreign key references public UUID
        fk_author UUID NOT NULL REFERENCES tb_user(pk_user) ON DELETE CASCADE,
        title TEXT NOT NULL,
        -- Business rules at database level
        CONSTRAINT ck_post_title_length CHECK (LENGTH(title) >= 1)
      );

  example_2:
    title: "Atomic Transaction"
    description: "Create user and default welcome post"
    code: |
      BEGIN TRANSACTION;

      -- Create user
      INSERT INTO tb_user (email, username) VALUES (
        'alice@example.com',
        'alice'
      ) RETURNING pk_user INTO user_id;

      -- Create welcome post
      INSERT INTO tb_post (fk_author, title) VALUES (
        user_id,
        'Welcome to the platform!'
      );

      COMMIT;  -- Both succeed or both fail

  example_3:
    title: "Optimistic Locking"
    description: "Detect concurrent updates"
    code: |
      -- Version field tracks updates
      UPDATE tb_post
      SET title = 'Updated Title', version = version + 1
      WHERE pk_post = %s AND version = %s
      RETURNING version;

      -- If another transaction incremented version, this returns 0 rows
      -- Client can detect conflict and retry

