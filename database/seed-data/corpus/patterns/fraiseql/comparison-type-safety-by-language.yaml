decision_matrix:
  team_programming_language:
    question: "What language is your team using?"
    answer_python: "FraiseQL type hints (Pythonic)"
    answer_typescript: "TypeScript native types (excellent DX)"
    answer_go: "gqlgen code generation (strict)"
    answer_java: "Spring GraphQL annotations (enterprise)"

  type_safety_criticality:
    question: "How critical is compile-time type safety?"
    answer_critical_no_runtime_errors: "Go or Java (enforced at runtime)"
    answer_important_catches_bugs: "TypeScript or FraiseQL"
    answer_nice_to_have: "Any (all provide some safety)"

  schema_evolution_rate:
    question: "Does your schema change frequently?"
    answer_stable_changes_rare: "Go (code generation acceptable)"
    answer_evolving_changes_often: "Python or TypeScript (easier evolution)"

  developer_productivity_vs_safety:
    question: "Priority: productivity or type safety?"
    answer_productivity: "Python (simple, iterate fast)"
    answer_safety: "Go (strict, enforced at runtime)"
    answer_balanced: "TypeScript (good balance)"

  existing_ecosystem:
    question: "Do you have existing infrastructure?"
    answer_python_ecosystem: "FraiseQL (fits naturally)"
    answer_nodejs_ecosystem: "TypeScript (native)"
    answer_go_microservices: "gqlgen (designed for)"
    answer_spring_boot: "Spring GraphQL (integrated)"

trade_off_summary:
  simplicity_vs_enforcement: |
    Python: Simple (no codegen), optional enforcement
    TypeScript: Simple, compile-time enforcement
    Go: Code generation, strict enforcement
    Java: Verbose, runtime enforcement

    **FraiseQL balances simplicity with type safety.**

  productivity_vs_safety: |
    Python: High productivity, lower type safety
    Go: Strict safety, lower productivity (codegen)
    TypeScript: Both (native types, good DX)
    Java: Lower productivity, high safety

    **Python best for iteration, Go best for safety.**

  source_of_truth_complexity: |
    Python: Types are source
    TypeScript: Schema + types (can drift)
    Go: Schema is source (types generated)
    Java: Annotations are source

    **Python simplest (single source).**

recommendations:
  - "Use Python type hints if team is Python and values productivity"
  - "Use TypeScript if JavaScript/Node team and want strong typing"
  - "Use Go codegen if microservices and type safety critical"
  - "Use Java annotations if Spring Boot and enterprise tools"
  - "Require type checker in CI/CD (don't rely on developer discipline)"
  - "Document typing expectations in team guidelines"
  - "Use gradual typing (allow untyped code to start)"

