    key_points:
      - "Strawberry: 2 queries (users + batched posts) with DataLoader"
      - "FraiseQL: 1 query (users + posts composed in database)"
      - "Strawberry: Familiar to most developers"
      - "FraiseQL: Better performance, less code complexity"

  advanced:
