blog_hooks:
  beginner:
    analogy: |
      Provider abstraction is like a universal adapter:
      - Different countries have different plug types
      - Adapter lets you use same device anywhere
      - You don't need to change the device for each country
      - Fraisier is the adapter for Git providers

  intermediate:
    focus: "Multi-provider webhook support"
    key_points:
      - "Each provider has different webhook format/signature"
      - "Fraisier normalizes all to common format"
      - "One config can manage GitHub and GitLab services"
      - "Auto-detect or explicit provider specification"
      - "Easy to add new providers"

  advanced:
    focus: "Extensible provider architecture"
    key_points:
      - "Registry pattern for provider registration"
      - "Provider-specific signature verification strategies"
      - "Webhook event normalization and mapping"
      - "Per-fraise provider overrides for flexibility"
      - "Custom provider implementation for proprietary platforms"
