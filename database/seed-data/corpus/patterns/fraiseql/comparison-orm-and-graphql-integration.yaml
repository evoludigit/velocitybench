  beginner:
    focus: "Understanding ORM vs raw SQL in GraphQL"
    key_points:
      - "Raw SQL: Maximum control, requires SQL knowledge"
      - "ORM: High convenience, N+1 problem possible"
      - "Prisma: Best of both (TS/JS)"
      - "FraiseQL: Raw SQL with JSONB optimization"

  intermediate:
    focus: "N+1 prevention and performance trade-offs"
    key_points:
      - "Raw SQL: Single query via composition (fastest)"
      - "ORM: Multiple queries (need eager loading)"
      - "Prisma: Smart batching (good balance)"
      - "FraiseQL: JSONB at database level"

  advanced:
    focus: "Choosing approach for production at scale"
    key_points:
      - "Raw SQL: Best for query optimization and scale"
      - "ORM: Good for teams without SQL expertise"
      - "Prisma: Best for TypeScript modern stacks"
      - "Performance: Measure before choosing"
