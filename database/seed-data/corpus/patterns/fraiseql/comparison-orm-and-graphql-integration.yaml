id: comparison-orm-and-graphql-integration
name: "Framework Comparison: ORM and GraphQL Integration Strategies"
category: fraiseql
type: comparison
tags:
  - framework-comparison
  - graphql
  - orm
  - database-access

summary:
  short: "Compare approaches to integrating ORMs with GraphQL frameworks"
  long: |
    Teams using GraphQL often need to decide: use an ORM (SQLAlchemy, Prisma, Django ORM)
    or write raw SQL? FraiseQL uses raw SQL and JSONB composition. Strawberry + SQLAlchemy
    uses ORM-driven queries. Prisma generates optimal queries automatically. Each approach
    has different performance, control, and learning curve implications.

problem:
  description: |
    ORM + GraphQL integration affects:
    - Query optimization (ORM-generated vs hand-optimized)
    - N+1 prevention (ORM helps, or JSONB solves it)
    - Type safety (ORM types vs GraphQL types)
    - Developer productivity (ORM convenience vs SQL control)
    - Performance at scale (ORM overhead vs raw SQL)

comparison:
  approach_1:
    name: "Raw SQL (FraiseQL)"
    philosophy: "Write SQL directly, no ORM abstraction, full query control"

    workflow: |
      Raw SQL approach:
      1. Define types in Python (dataclasses, @fraiseql.type)
      2. Write queries using raw SQL (or parameterized queries)
      3. Use JSONB for composition (prevent N+1)
      4. Map SQL results to Python types

      Example:
      ```python
      @fraiseql.type
      class User:
          id: str
          email: str
          posts: list[Post]

      @fraiseql.query
      async def get_user(user_id: str) -> User:
          # Raw SQL with JSONB composition
          result = await db.query_one("""
            SELECT
              u.id,
              u.email,
              jsonb_agg(jsonb_build_object(
                'id', p.id,
                'title', p.title
              )) as posts
            FROM tb_user u
            LEFT JOIN tb_post p ON p.user_id = u.id
            WHERE u.id = %s
            GROUP BY u.id
          """, user_id)
          return User(**result)
      ```

    abstraction_level: "None (direct SQL)"
    query_control: "Maximum (write any query)"
    n_plus_one_prevention: "JSONB composition (database level)"

    pros:
      - "Maximum query control (write exactly what you need)"
      - "Performance predictable (see actual query in code)"
      - "JSONB composition (prevent N+1 at DB level)"
      - "No ORM overhead (raw SQL performance)"
      - "EXPLAIN ANALYZE works (optimize actual queries)"
      - "Complex queries possible (CTEs, window functions)"

    cons:
      - "SQL knowledge required (team must know SQL)"
      - "Type mapping manual (result → Python type)"
      - "No ORM safety nets (must handle nulls, types)"
      - "Schema changes require query updates"
      - "Not portable (SQL dialect specific)"
      - "SQL injection risk (must use parameterized queries)"

    best_for: "Teams with SQL expertise, query optimization critical"
    developer_experience: "High control, high responsibility"
    learning_curve: "High (must understand SQL and JSONB)"

  approach_2:
    name: "ORM-Driven (Strawberry + SQLAlchemy)"
    philosophy: "ORM models are source of truth, write queries through ORM"

    workflow: |
      ORM-driven approach:
      1. Define models in ORM (SQLAlchemy, Django ORM)
      2. Define GraphQL types from models
      3. Write resolvers using ORM query API
      4. ORM generates SQL behind the scenes

      Example with SQLAlchemy:
      ```python
      from sqlalchemy import Column, String, ForeignKey
      from sqlalchemy.orm import relationship

      class UserModel(Base):
          __tablename__ = "tb_user"
          id = Column(String, primary_key=True)
          email = Column(String)
          posts = relationship("PostModel", back_populates="user")

      class PostModel(Base):
          __tablename__ = "tb_post"
          id = Column(String, primary_key=True)
          user_id = Column(String, ForeignKey("tb_user.id"))
          user = relationship("UserModel", back_populates="posts")

      # GraphQL types from models
      @strawberry.type
      class User:
          id: str
          email: str

          @strawberry.field
          async def posts(self) -> list[Post]:
              return self.posts  # From ORM relationship

      # Resolver
      @strawberry.type
      class Query:
          @strawberry.field
          async def user(self, session: Session, id: str) -> User:
              return session.query(UserModel).filter_by(id=id).first()
      ```

    abstraction_level: "High (ORM abstracts SQL)"
    query_control: "Medium (ORM decides SQL strategy)"
    n_plus_one_prevention: "DataLoader + eager loading"

    pros:
      - "SQL knowledge not required (ORM abstracts)"
      - "Type safety from models (ORM types)"
      - "Relationships automatic (ORM handles FK)"
      - "Schema syncing easier (ORM migrations)"
      - "Batch operations easy (ORM supports bulk)"
      - "Familiar to Django developers"

    cons:
      - "N+1 problem common (ORM lazy loads by default)"
      - "Query optimization hard (ORM generates inefficient SQL)"
      - "Performance less predictable (ORM decides strategy)"
      - "ORM overhead (extra abstraction layer)"
      - "DataLoader discipline needed (prevent N+1)"
      - "Eager loading complexity (must specify relationships)"

    best_for: "Teams already using ORM, prioritizing convenience"
    developer_experience: "Convenient, but N+1 lurks"
    learning_curve: "Medium (ORM concepts, eager loading)"

  approach_3:
    name: "ORM Code Generation (Prisma)"
    philosophy: "Schema-first ORM, auto-generate client and resolvers"

    workflow: |
      Prisma approach:
      1. Define data model in Prisma schema (human-friendly)
      2. Prisma generates ORM client (TypeScript)
      3. Use generated client in resolvers (type-safe)
      4. Prisma handles query optimization

      Example:
      ```prisma
      // schema.prisma
      model User {
        id      String  @id @default(cuid())
        email   String  @unique
        posts   Post[]
      }

      model Post {
        id      String  @id @default(cuid())
        title   String
        userId  String
        user    User    @relation(fields: [userId], references: [id])
      }
      ```

      Generate client:
      ```bash
      $ npx prisma generate
      # Generates prisma client (TypeScript)
      ```

      Use in resolvers:
      ```typescript
      const prisma = new PrismaClient();

      const resolvers = {
        Query: {
          user: (_, { id }) => {
            return prisma.user.findUnique({
              where: { id },
              include: { posts: true }  // Eager load
            });
          }
        }
      };
      ```

    abstraction_level: "Medium (ORM client, but optimized)"
    query_control: "Medium (ORM client API, but smart)"
    n_plus_one_prevention: "Automatic eager loading (client API)"

    pros:
      - "Schema-first (Prisma schema is source)"
      - "Code generation (type-safe client)"
      - "Smart query optimization (Prisma optimizes)"
      - "N+1 prevented naturally (include syntax)"
      - "Type-safe resolvers (generated types)"
      - "Developer experience excellent"

    cons:
      - "Prisma-specific (not portable)"
      - "Less SQL control (Prisma decides query strategy)"
      - "Complex queries harder (not all SQL expressible)"
      - "Node.js only (not widely used in Python)"
      - "Learning Prisma schema syntax"
      - "Migration management required"

    best_for: "JavaScript/TypeScript teams, modern stacks"
    developer_experience: "Excellent (schema-first, type-safe)"
    learning_curve: "Low (Prisma schema is intuitive)"

  fraiseql_choice:
    name: "Raw SQL with JSONB Composition"
    rationale: |
      FraiseQL chose **raw SQL** because:
      1. **Query control**: Write exactly the query needed
      2. **Performance**: JSONB composition at DB level (not N+1 + batching)
      3. **Optimization**: EXPLAIN ANALYZE shows true cost
      4. **No abstraction overhead**: Direct SQL execution
      5. **Scaling**: Proven pattern at massive scale

    implementation_philosophy: |
      FraiseQL's approach:
      - Types in Python are separate from SQL
      - Queries are explicit (visible in code)
      - JSONB composition prevents N+1 (database level)
      - No ORM abstraction layer
      - Full query control

      Key insight: Raw SQL isn't harder, it's clearer:
      - Every query is visible (not hidden in ORM)
      - Performance is predictable (write the query, run it)
      - Optimization is possible (EXPLAIN ANALYZE the actual query)

    assessment_strengths: |
      ✓ **Query control**: Write exactly what's needed
      ✓ **Performance**: JSONB composition at DB level
      ✓ **Predictable**: See actual query in code
      ✓ **Optimization**: EXPLAIN ANALYZE works
      ✓ **No N+1**: Single query via composition
      ✓ **Memory efficient**: Results streamed, not buffered
      ✓ **Scaling**: Proven at massive scale

    assessment_weaknesses: |
      ✗ **SQL knowledge**: Team must understand SQL
      ✗ **Type mapping**: Manual result → Python type
      ✗ **No safety nets**: ORM would catch some errors
      ✗ **Schema changes**: Queries must be updated
      ✗ **Not portable**: SQL dialect specific (PostgreSQL)
      ✗ **SQL injection risk**: Must use parameterized queries
      ✗ **More code**: Can't reuse ORM relationships

    when_fraiseql_raw_sql_is_right: |
      Choose raw SQL when:
      - **Performance critical**: Query optimization matters
      - **Complex queries**: CTEs, window functions needed
      - **Team knows SQL**: SQL expertise in team
      - **JSONB composition**: PostgreSQL specific benefit
      - **Query visibility important**: See queries in code
      - **Scaling expected**: Billions of rows, composition matters

    when_orm_is_better: |
      Choose ORM when:
      - **Team weak in SQL**: ORM abstracts SQL
      - **Schema stability**: Models match DB exactly
      - **Rapid development**: ORM convenience valued
      - **Query complexity**: Simple CRUD operations
      - **Migration management**: ORM handles schema changes
      - **Portability**: Support multiple databases

    when_prisma_is_better: |
      Choose Prisma when:
      - **JavaScript/TypeScript**: Prisma is JS/TS focused
      - **Schema-first**: Schema as source of truth
      - **Type safety**: Generated types important
      - **N+1 prevention**: Built into client API
      - **Developer experience**: Want excellent DX

benchmarks:
  scenario: "Get user with 100 posts and comments on each"

  query_execution:
    raw_sql:
      queries: "1 (JSONB composition)"
      strategy: "Single query with joins and composition"
      latency: "35-45ms"

    orm_strawberry:
      queries: "101+ (user + posts + comments per post)"
      strategy: "Lazy loading (N+1 unless eager loaded)"
      latency_with_dataloader: "120-150ms (batched to 3 queries)"

    prisma:
      queries: "3 (user + posts + comments batched)"
      strategy: "Smart batching with include syntax"
      latency: "45-60ms"

  developer_productivity:
    raw_sql: "High once written (query is visible)"
    orm_strawberry: "Very high initially (models auto-generate)"
    prisma: "Very high (schema-first, type-safe)"

  query_optimization_effort:
    raw_sql: "Built-in (single query is optimal)"
    orm_strawberry: "High (eager loading, query optimization)"
    prisma: "Low (optimized by design)"

  type_safety:
    raw_sql: "Manual (result mapping)"
    orm_strawberry: "High (ORM types)"
    prisma: "Very high (generated types)"

  schema_change_difficulty:
    raw_sql: "Medium (update query and type)"
    orm_strawberry: "Low (model change, automatic)"
    prisma: "Low (schema change, regenerate)"

  n_plus_one_prevention:
    raw_sql: "Built-in (JSONB composition)"
    orm_strawberry: "Requires discipline (DataLoader, eager load)"
    prisma: "Built-in (include syntax)"

  memory_usage:
    raw_sql: "Streaming (minimal memory)"
    orm_strawberry: "Buffered (full result set in memory)"
    prisma: "Buffered (full result set in memory)"

decision_matrix:
  team_sql_knowledge:
    question: "Does your team know SQL well?"
    answer_yes_strong_sql: "Raw SQL (FraiseQL)"
    answer_no_weak_sql: "ORM (Strawberry + SQLAlchemy)"

  database_focus:
    question: "Is database optimization critical?"
    answer_yes_performance_matters: "Raw SQL (query control)"
    answer_no_crud_sufficient: "ORM (simpler)"

  programming_language:
    question: "What language are you using?"
    answer_python: "Raw SQL (FraiseQL) or ORM (Strawberry)"
    answer_typescript: "Prisma (optimal for TS)"
    answer_other: "ORM for that language"

  team_preference:
    question: "Prefer convenience or control?"
    answer_convenience: "ORM (handles relationships)"
    answer_control: "Raw SQL (full control)"

  schema_stability:
    question: "Does schema change frequently?"
    answer_stable: "Raw SQL (query written once)"
    answer_evolving: "ORM (handles migrations)"

trade_off_summary:
  control_vs_convenience: |
    Raw SQL: Maximum control, must write queries
    ORM: High convenience, less control

    **Raw SQL is actually easier once SQL mastered.**

  performance_vs_productivity: |
    Raw SQL: Best performance, more coding
    ORM: Good performance (if used well), more productivity
    Prisma: Good performance, excellent productivity

    **FraiseQL trades productivity for performance.**

  predictability_vs_abstraction: |
    Raw SQL: Predictable (see query), no abstraction
    ORM: Less predictable (ORM decides), higher abstraction
    Prisma: Predictable + abstraction (smart)

    **Raw SQL is most transparent about performance.**

  database_portability_vs_optimization: |
    Raw SQL: Not portable (SQL specific), optimizable
    ORM: Portable (any database), less optimizable
    Prisma: Limited portable (TS focus), smart optimization

    **Raw SQL is best for optimization, ORM for portability.**

recommendations:
  - "Use raw SQL if query optimization is critical (FraiseQL approach)"
  - "Use ORM if convenience and rapid development valued (Strawberry)"
  - "Use Prisma if JavaScript/TypeScript and want best DX"
  - "Don't use ORM without understanding N+1 (eager loading essential)"
  - "Don't use raw SQL without parameterized queries (SQL injection risk)"
  - "Measure: benchmark actual queries and measure latency"
  - "Team knowledge matters more than framework choice"

cost_analysis:
  raw_sql:
    development_speed: "Moderate (write SQL queries)"
    query_optimization: "Built-in (single query)"
    performance: "Best (no abstraction)"
    maintenance: "Medium (query updates needed)"

  orm:
    development_speed: "Very high (models auto-generate)"
    query_optimization: "Requires discipline (eager loading)"
    performance: "Good if well-used (N+1 risk)"
    maintenance: "Low (ORM handles schema)"

  prisma:
    development_speed: "Very high (schema-first)"
    query_optimization: "Built-in (smart batching)"
    performance: "Good (optimized client)"
    maintenance: "Low (schema-driven)"

