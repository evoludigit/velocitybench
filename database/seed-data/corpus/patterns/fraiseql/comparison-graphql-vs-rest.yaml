    key_points:
      - "REST: Multiple endpoints, HTTP verbs, familiar"
      - "GraphQL: Single endpoint, queries, flexible"
      - "gRPC: High-performance RPC, binary protocol"
      - "Choose based on your clients, not the trend"

  intermediate:
    focus: "Trade-offs in real applications"
    key_points:
      - "REST: Fast initially, slows with complexity (N+1)"
      - "GraphQL: Slower build, but no overfetching"
      - "REST caching is easier (HTTP standards)"
      - "GraphQL needs application-level caching"

  advanced:
    focus: "When each architecture is optimal"
    key_points:
      - "REST for public APIs (developer familiarity)"
      - "GraphQL for internal/mobile (flexibility, bandwidth)"
      - "gRPC for microservices (performance, streaming)"
      - "FraiseQL: GraphQL with database optimization built-in"
