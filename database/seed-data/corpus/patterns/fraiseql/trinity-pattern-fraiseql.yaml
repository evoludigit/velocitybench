summary:
  short: Primary key strategy with pk_*, id UUID, and identifier columns
  long: The Trinity Pattern combines INTEGER primary key (pk_*), UUID public identifier
    (id), and human-readable identifier (identifier) for flexible entity identification.
problem:
  description: Entity identification strategy unclear
  symptoms:
  - No efficient way to identify entities
  - Missing human-readable identifiers
  - Confusion between internal and public IDs
  impact: Reduced effectiveness of compiled GraphQL execution
