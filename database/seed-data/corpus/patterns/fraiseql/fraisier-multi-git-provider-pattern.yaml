# Fraisier Multi-Git-Provider Configuration Pattern
# VelocityBench Knowledge Corpus

id: fraisier-multi-git-provider
name: "Fraisier: Mixed Git Provider Configuration Strategy"
category: fraiseql
type: pattern
severity: medium
tags:
  - fraisier
  - git-providers
  - configuration
  - multi-provider
  - mixed-environments
  - organization-structure

summary:
  short: "Configure and manage services across multiple Git providers in single Fraisier instance"
  long: |
    Fraisier enables organizations to manage services spread across different Git platforms.
    Teams can use GitHub, GitLab, Gitea, or Bitbucket based on needs without requiring separate tools.
    Default Git provider for all services with per-fraise overrides for services on different platforms.
    Simplifies multi-team organizations where different teams use different Git providers.

problem:
  description: |
    Organizations evolve deployment tooling and Git platforms over time:
    - Company migrating from GitHub to GitLab
    - Different teams using different Git providers (GitHub vs internal GitLab)
    - Open source projects on GitHub, internal projects on self-hosted Gitea
    - M&A combines teams with different Git providers
    - Deployment tool shouldn't force single Git platform choice

    Fraisier should support mixed environments gracefully.

  symptoms:
    - name: "Multiple deployment tools for different providers"
      description: "One tool for GitHub, different tool for GitLab"
      detection: "Complex deployment infrastructure, hard to maintain"

    - name: "Can't easily move services between providers"
      description: "Migrating repository means changing deployment tool"
      detection: "Deployment config tied to specific Git provider"

    - name: "Inconsistent workflows across teams"
      description: "Different teams use different deployment procedures"
      detection: "Training, documentation for each tool"

    - name: "Organization changes require tool migration"
      description: "Acquiring new team means new deployment tool"
      detection: "Difficult org restructuring"

solution:
  principle: "Flexible provider configuration with defaults and per-fraise overrides"

  components:
    - name: "Default provider configuration"
      type: "Fallback"
      purpose: "Most services use this provider"

    - name: "Per-fraise provider override"
      type: "Flexibility"
      purpose: "Individual service can use different provider"

    - name: "Provider discovery"
      type: "Convenience"
      purpose: "Auto-detect provider from webhook headers"

    - name: "Configuration inheritance"
      type: "Reusability"
      purpose: "Services inherit common settings"

default_provider_configuration:
  description: "Most services use this Git provider"
  example: |
    # fraises.yaml: Default GitHub for all services
    git:
      provider: github                      # Default: all services use GitHub
      github:
        base_url: https://github.com
        webhook_secret: ${FRAISIER_WEBHOOK_SECRET}

    fraises:
      api:
        type: api
        # Uses default GitHub provider
        environments:
          production:
            branch: main

      worker:
        type: etl
        # Uses default GitHub provider
        environments:
          production:
            branch: main

      scheduler:
        type: scheduled
        # Uses default GitHub provider
        environments:
          production:
            branch: main

per_fraise_provider_override:
  description: "Specific services use different provider"
  migration_scenario: |
    # Scenario: Migrating from GitHub to GitLab
    # Phase 1: New services on GitLab, existing on GitHub

    git:
      provider: github  # Existing default

      github:
        base_url: https://github.com
        webhook_secret: ${FRAISIER_WEBHOOK_SECRET}

      gitlab:
        base_url: https://gitlab.mycompany.com
        secret_token: ${FRAISIER_WEBHOOK_SECRET}

    fraises:
      # Legacy services still on GitHub
      api_v1:
        type: api
        # Uses default GitHub
        environments:
          production:
            branch: main

      # New services on GitLab
      api_v2:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments:
          production:
            branch: main

      worker_v2:
        type: etl
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments:
          production:
            branch: main

  multi_team_scenario: |
    # Scenario: Different teams use different providers

    git:
      provider: github  # Default for most

      github:
        base_url: https://github.com
        webhook_secret: ${FRAISIER_WEBHOOK_SECRET}

      gitlab:
        base_url: https://gitlab.mycompany.com
        secret_token: ${FRAISIER_WEBHOOK_SECRET}

      gitea:
        base_url: https://git.homelab.local
        webhook_secret: ${FRAISIER_WEBHOOK_SECRET}

    fraises:
      # Team A: GitHub
      team_a_api:
        type: api
        # Uses default GitHub
        environments:
          production:
            branch: main

      # Team B: Internal GitLab
      team_b_api:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments:
          production:
            branch: main

      # Team C: Personal Gitea
      team_c_api:
        type: api
        git:
          provider: gitea
          base_url: https://git.homelab.local
        environments:
          production:
            branch: main

  open_source_and_enterprise_scenario: |
    # Scenario: Public library on GitHub, enterprise tools on internal GitLab

    git:
      provider: github

      github:
        base_url: https://github.com
        webhook_secret: ${FRAISIER_WEBHOOK_SECRET}

      gitlab:
        base_url: https://gitlab.mycompany.com
        secret_token: ${FRAISIER_WEBHOOK_SECRET}

    fraises:
      # Public open source
      mylib:
        type: api
        # Uses default GitHub
        environments:
          production:
            branch: main

      # Enterprise SaaS
      myapp_api:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments:
          production:
            branch: main

      myapp_admin:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments:
          production:
            branch: main

webhook_routing_with_multiple_providers:
  description: "Webhook server handles all providers"
  routing_flow: |
    1. Webhook received on POST /webhook
    2. Headers analyzed to detect provider:
       - X-Hub-Signature-256 → GitHub
       - X-Gitlab-Token → GitLab
       - X-Gitea-Signature → Gitea
       - X-Hub-Signature → Bitbucket
    3. If provider not detected, check ?provider=github parameter
    4. Use provider implementation to:
       - Verify webhook signature
       - Parse event format
       - Extract branch, repository, pusher
    5. Look up service in branch_mapping
    6. Route to correct fraise/environment

  universal_webhook_endpoint: |
    # Single endpoint handles all providers
    POST /webhook

    # Auto-detects provider from headers
    # Webhook payload varies by provider but endpoint is the same

    # Example GitHub webhook:
    POST /webhook
    Header: X-Hub-Signature-256: sha256=...
    Body: {...GitHub event JSON...}

    # Example GitLab webhook:
    POST /webhook
    Header: X-Gitlab-Token: secret...
    Body: {...GitLab event JSON...}

    # Fraisier detects provider and routes appropriately

configuration_inheritance:
  description: "Services inherit common settings"
  global_vs_fraise: |
    # Global environment settings (all providers can use)
    environments:
      production:
        server: prod.myserver.com
        log_dir: /var/log/myapp
        notifications:
          enabled: true
          slack_channel: "#deployments"

    # Fraise-specific overrides
    fraises:
      api:
        type: api
        # This service inherits global production environment
        # But can override specific settings
        environments:
          production:
            name: api.myapp.io
            branch: main
            app_path: /var/www/api
            systemd_service: api.service
            # Uses inherited notifications, server, log_dir
            # But overrides name, branch, app_path, systemd_service

      internal_api:
        type: api
        git:
          provider: gitlab
        # Uses global production settings
        # Plus GitLab as provider
        environments:
          production:
            name: internal-api.mycompany.com
            branch: main
            app_path: /var/www/internal-api

migration_patterns:
  gradual_migration: |
    # Phase 1: Start on GitHub (everything uses default)
    git:
      provider: github
      github:
        base_url: https://github.com
        webhook_secret: ...

    fraises:
      api:
        type: api
        environments: ...
      worker:
        type: etl
        environments: ...

    # Phase 2: Migrate api to GitLab (override api provider)
    fraises:
      api:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.mycompany.com
        environments: ...
      worker:
        type: etl
        # Still uses GitHub (default)
        environments: ...

    # Phase 3: Migrate worker to GitLab (update default)
    git:
      provider: gitlab  # New default
      gitlab:
        base_url: https://gitlab.mycompany.com
        secret_token: ...
      github:           # Keep GitHub config for old services
        base_url: https://github.com
        webhook_secret: ...

    fraises:
      api:
        type: api
        # Now uses default GitLab
        environments: ...
      worker:
        type: etl
        # Now uses default GitLab
        environments: ...

      legacy_service:
        type: api
        git:
          provider: github  # One legacy service still on GitHub
        environments: ...

  post_merger_integration: |
    # Scenario: Company A (GitHub) + Company B (GitLab)

    git:
      provider: github  # Company A's default

      github:
        base_url: https://github.com
        webhook_secret: ${COMPANY_A_WEBHOOK_SECRET}

      gitlab:
        base_url: https://gitlab.company-b.com
        secret_token: ${COMPANY_B_WEBHOOK_SECRET}

    fraises:
      # Company A services (GitHub)
      company_a_api:
        type: api
        environments: ...

      company_a_worker:
        type: etl
        environments: ...

      # Company B services (GitLab)
      company_b_api:
        type: api
        git:
          provider: gitlab
          base_url: https://gitlab.company-b.com
        environments: ...

      company_b_worker:
        type: etl
        git:
          provider: gitlab
          base_url: https://gitlab.company-b.com
        environments: ...

      # Integrated service
      combined_api:
        type: api
        git:
          provider: github
        environments: ...

best_practices:
  - name: "Use default provider for majority of services"
    description: "Most services should use same provider"
    rationale: "Simpler configuration, easier to understand"

  - name: "Override per-fraise for exceptions"
    description: "Only override when service is on different provider"
    rationale: "Minimal configuration duplication"

  - name: "Support all commonly-used providers in config"
    description: "Add GitHub, GitLab, Gitea, Bitbucket sections"
    rationale: "Ready for any future migrations"

  - name: "Use environment variables for secrets"
    description: "Store webhook secrets in env vars, not config"
    rationale: "Don't leak secrets if config is ever exposed"

  - name: "Document provider choice in comments"
    description: "Explain why each service uses its provider"
    rationale: "Easier for new team members to understand"

  - name: "Test provider switching"
    description: "Before large migration, test webhook routing"
    rationale: "Catch configuration errors early"

  - name: "Migrate services incrementally"
    description: "Move one service at a time"
    rationale: "Easy rollback if something breaks"

  - name: "Monitor webhook success rate per provider"
    description: "Ensure all providers receive webhooks"
    rationale: "Catch webhook delivery issues immediately"

anti_patterns:
  - name: "Different Fraisier instances per provider"
    consequence: "Fragmented deployment infrastructure"
    example: "One Fraisier for GitHub, another for GitLab"

  - name: "Hard-coded provider in service config"
    description: "Service config includes provider details"
    consequence: "Can't switch provider without code change"
    example: "git_provider = 'github' in service definition"

  - name: "No default provider"
    consequence: "Every service requires provider specification"
    example: "Every fraise must specify git: provider:"

  - name: "Duplicate configuration for each provider"
    consequence: "Hard to maintain, easy to have inconsistencies"
    example: "Separate fraise definitions for GitHub vs GitLab versions"

  - name: "No support for mixed environments"
    consequence: "Teams forced to use same provider"
    example: "Tool only supports one provider at a time"

use_cases:
  - scenario: "Company-wide GitHub to GitLab migration"
    approach: |
      1. Add GitLab config to default git section
      2. Gradually override individual services: git.provider: gitlab
      3. Update default provider when majority migrated
      4. Override legacy services still on GitHub
    benefit: "Single tool manages entire migration"

  - scenario: "Open source + enterprise deployment"
    approach: |
      - Public library on GitHub (uses default)
      - Enterprise backend on internal GitLab (override)
      - Single Fraisier manages both
    benefit: "Different platforms for different purposes"

  - scenario: "Team autonomy with unified tooling"
    approach: |
      - Default provider GitHub (company standard)
      - Team can override to use their preference (GitLab, Gitea)
      - Central ops manages same Fraisier for all
    benefit: "Teams choose tools, ops maintains consistency"

  - scenario: "Post-merger integration"
    approach: |
      - Company A services on GitHub
      - Company B services on GitLab
      - New services default to company standard
      - Old services keep original providers
    benefit: "Unified deployment during org restructuring"

related_patterns:
  - id: "git-provider-abstraction"
    description: "Provider abstraction architecture"

  - id: "fraisier-deployment-orchestration"
    description: "Overall deployment configuration"

  - id: "webhook-event-driven-deployment"
    description: "Webhook routing with multiple providers"

  - id: "fraisier-multi-environment"
    description: "Multi-environment configuration"

blog_hooks:
  beginner:
    analogy: |
      Multi-provider support is like having multiple keys:
      - You don't need a different lock for each key
      - One door (Fraisier) works with multiple keys (providers)
      - You can change locks without changing doors

  intermediate:
    focus: "Flexible Git provider configuration"
    key_points:
      - "Default provider for most services"
      - "Per-service override for exceptions"
      - "Support all major providers (GitHub/GitLab/Gitea/Bitbucket)"
      - "Gradual migration with per-service overrides"
      - "No tool changes during Git platform migrations"

  advanced:
    focus: "Organization-scale deployment strategy"
    key_points:
      - "Unified deployment for multi-team organizations"
      - "Provider abstraction hides implementation details"
      - "Webhook routing works across all providers"
      - "Configuration inheritance for consistency"
      - "Support M&A integration and org restructuring"
