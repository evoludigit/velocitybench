  beginner:
    focus: "Understanding federation schema metadata"
    key_points:
      - "schema.json must include federation metadata"
      - "@key fields listed in schema metadata"
      - "External fields tracked for extensions"
      - "Field directives documented in metadata"

  intermediate:
    focus: "Generating and validating schema.json"
