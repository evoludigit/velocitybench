  intermediate:
    focus: "Trade-offs in practice at growing scale"
    key_points:
      - "PostGraphile: Discover N+1 at scale, patch with DataLoader"
      - "FraiseQL: N+1 prevented via JSONB composition from day one"
      - "PostGraphile schema driven by database (introspection)"
      - "FraiseQL schema driven by code (types)"

  advanced:
    focus: "Choosing architecture for production at scale"
    key_points:
      - "PostGraphile: Simplicity beats optimization initially"
      - "FraiseQL: Optimization control from day one"
      - "PostGraphile: Good for schema-driven orgs (DB teams own schema)"
      - "FraiseQL: Good for feature-team orgs (application owns optimization)"
