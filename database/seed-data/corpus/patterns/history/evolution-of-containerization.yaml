    how: "Specification for layers, config, manifests"

  - innovation: "Registry Protocol"
    year: 2013
    impact: "Easy image distribution"
    how: "HTTP-based pulling and pushing"

  - innovation: "Namespace Isolation"
    year: 2000s
    impact: "Process isolation at kernel level"
    how: "Linux kernel namespaces"

  - innovation: "Resource Limits (cgroups)"
    year: 2006
    impact: "Prevent containers consuming all resources"
    how: "Kernel resource accounting and limiting"

  - innovation: "Container Runtime Interface"
    year: 2018
    impact: "Multiple runtimes possible"
    how: "Standard API for container lifecycle"

