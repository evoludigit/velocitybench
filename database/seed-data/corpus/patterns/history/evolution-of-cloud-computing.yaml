  beginner:
    analogy: |
      Cloud computing evolution is like housing:
      - Co-location: Buying property in a shared building
      - EC2: Renting an apartment (pay as you go)
      - Kubernetes: Apartment complex management
      - Serverless: Airbnb (pay exactly for what you use)

  intermediate:
    focus: "Understanding architectural implications"
    key_points:
      - "How each generation solved cost problems"
      - "Scalability patterns at each stage"
      - "Trade-offs between control and convenience"
      - "Choosing the right layer for your workload"

  advanced:
    focus: "Strategic infrastructure decisions"
    key_points:
      - "Multi-cloud strategies and when they make sense"
      - "Cost optimization at scale"
      - "Avoiding vendor lock-in (practical approach)"
      - "Predicting next cloud computing evolution"
