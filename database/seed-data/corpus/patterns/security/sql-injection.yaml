id: sql-injection
name: "SQL Injection Prevention & Defense"
category: security
type: standard
tags:
  - security
  - sql-injection
  - database
  - owasp-top-10

summary:
  short: "Preventing SQL injection attacks that allow unauthorized database access and manipulation"
  long: |
    SQL injection is one of the most dangerous and common web vulnerabilities. Attackers inject SQL code through user input to access, modify, or delete data. Prevention requires parameterized queries, input validation, and secure coding practices.

problem:
  description: "User input incorporated directly into SQL queries allows attackers to modify query logic"
  symptoms:
    - "Building queries by string concatenation with user input"
    - "No distinction between code and data in SQL"
    - "Login form with email=admin' OR '1'='1 bypasses authentication"
    - "Attacker can extract entire database contents"
    - "Attacker can modify or delete data"
  impact: "Complete database compromise, data theft, unauthorized access, data deletion, regulatory violations"

solution:
  description: "Use parameterized queries (prepared statements) to separate SQL code from data"
  principle: |
    SQL code and user data are ALWAYS separate
    User input never becomes part of query structure
    Database driver handles escaping

vulnerable_code:
  python_bad: |
    # VULNERABLE - NEVER DO THIS
    email = request.form['email']
    query = f"SELECT * FROM users WHERE email = '{email}'"
    user = db.execute(query).fetch_one()

    # Attack: email = "admin' OR '1'='1"
    # Results in: SELECT * FROM users WHERE email = 'admin' OR '1'='1'
    # Returns ALL users (1=1 is always true)

  php_bad: |
    // VULNERABLE - NEVER DO THIS
    $email = $_POST['email'];
    $query = "SELECT * FROM users WHERE email = '" . $email . "'";
    $result = mysqli_query($conn, $query);

    // Attack: DROP TABLE users;--
    // Results in: SELECT * FROM users WHERE email = '
    // DROP TABLE users;--'
    // Executes DROP TABLE, deleting entire table

safe_code:
  python_good: |
    # SAFE - Use parameterized query
    email = request.form['email']
    query = "SELECT * FROM users WHERE email = ?"
    user = db.execute(query, [email]).fetch_one()

    # Driver handles escaping
    # Email is always treated as data, never as code
    # Even "admin' OR '1'='1" is treated as literal string

  php_good: |
    // SAFE - Use prepared statement
    $email = $_POST['email'];
    $query = $conn->prepare("SELECT * FROM users WHERE email = ?");
    $query->bind_param("s", $email);
    $query->execute();
    $result = $query->get_result();

  nodejs_good: |
    // SAFE - Parameterized query
    const email = req.body.email;
    const query = 'SELECT * FROM users WHERE email = $1';
    const result = await db.query(query, [email]);

attack_vectors:
  authentication_bypass: |
    Input: ' OR '1'='1
    Query: SELECT * FROM users WHERE password = '' OR '1'='1'
    Result: Returns first user (authentication bypassed)

  data_extraction: |
    Input: ' UNION SELECT password FROM users--
    Query: SELECT email FROM users WHERE id = 1' UNION SELECT password FROM users--'
    Result: Extracts password column from users table

  data_modification: |
    Input: '; UPDATE users SET is_admin = true WHERE id = 1;--
    Query: SELECT * FROM users WHERE id = 1'; UPDATE users SET is_admin = true WHERE id = 1;--'
    Result: Attacker becomes admin

  time_based_blind: |
    Input: '; WAITFOR DELAY '00:00:05';--
    Query: SELECT * FROM users WHERE id = 1'; WAITFOR DELAY '00:00:05';--'
    Result: If page delays 5s, attacker knows query executed (even if no visible output)

prevention_techniques:
  parameterized_queries:
    description: "Separate SQL code from user data at query level"
    how_it_works: |
      1. Query template with placeholders - "SELECT * FROM users WHERE email = ?"
      2. User data sent separately - ["user@example.com"]
      3. Database driver escapes data
      4. Query and data never mixed in string form

    implementation: |
      - Python: db.execute("SELECT * FROM users WHERE email = ?", [email])
      - PHP: $stmt->bind_param("s", $email)
      - Node: db.query("SELECT * FROM users WHERE email = $1", [email])
      - Java: PreparedStatement.setString(1, email)

  input_validation:
    description: "Validate input format and length; reject suspicious input"
    examples:
      - "Email: validate format matches RFC 5322"
      - "Phone: validate digits only, specific length"
      - "Age: validate numeric, 0-150 range"
      - "ID: validate numeric, expected range"

    whitelist_approach: |
      # Only allow known-good input
      ALLOWED_STATUSES = ['pending', 'active', 'inactive']
      if status not in ALLOWED_STATUSES:
        raise ValueError("Invalid status")

    benefit: "Even if parameterized queries fail, validation catches attacks"

  stored_procedures:
    description: "Business logic in database; less vulnerable if written carefully"
    pro: "SQL code pre-compiled; less injection surface"
    con: "Not foolproof; parameterized queries still needed"
    example: |
      -- Stored procedure with parameters
      CREATE PROCEDURE GetUser @email NVARCHAR(255)
      AS
      BEGIN
        SELECT * FROM users WHERE email = @email
      END

      -- Call with parameters (safe)
      EXEC GetUser @email = 'user@example.com'

  orm_frameworks:
    description: "ORM handles parameterized queries automatically"
    examples: |
      - Django ORM: User.objects.filter(email=email)
      - SQLAlchemy: session.query(User).filter(User.email == email)
      - Sequelize: User.findOne({ where: { email: email } })

    benefit: "Developers rarely write raw SQL; less injection risk"
    caveat: |
      ORMs can still be misused:
      - Raw queries: session.query(f"SELECT * FROM users WHERE email = '{email}'")  # VULNERABLE
      - Concatenation in filter: session.query(User).filter(f"email = {email}")      # VULNERABLE

least_privilege:
    description: "Database user has minimal required permissions"
    principle: |
      - Web application uses read-only user for SELECT
      - Only admin user can DELETE/DROP
      - Reports use separate read-only replica
      - Each service has its own user with limited permissions

    example: |
      -- Web app user: read-only
      GRANT SELECT ON app_db.* TO 'webapp'@'localhost';

      -- Admin user: full access
      GRANT ALL ON app_db.* TO 'admin'@'localhost';

      -- If webapp user compromised, attacker cannot modify data

error_handling:
    bad: |
      # Shows SQL query in error message
      try:
        user = db.execute(query)
      except Exception as e:
        return f"Database error: {e}"
        # Attacker sees: "Unknown column 'injected_payload' in where clause"
        # Reveals database structure

    good: |
      # Generic error message; logs details
      try:
        user = db.execute(query)
      except Exception as e:
        logger.error(f"Database error for user {user_id}: {e}")
        return "An error occurred. Please try again later."

  benefits: |
    - Attackers cannot see database structure from errors
    - Logging captures actual errors for debugging
    - User-facing message doesn't leak information

web_application_firewall:
  description: "WAF detects and blocks common SQL injection patterns"
  limitations: |
    - Not a substitute for parameterized queries
    - Can produce false positives
    - Sophisticated attacks may bypass WAF
  proper_use: |
    Defense in depth: WAF + parameterized queries + input validation

testing_for_sql_injection:
  manual_testing: |
    - Try: ' OR '1'='1
    - Try: '; DROP TABLE users;--
    - Try: admin'--
    - Try: 1' UNION SELECT NULL--
    - Check for error messages revealing structure

  automated_tools: |
    - SQLmap: Automated SQL injection detection
    - OWASP ZAP: Web application scanner
    - Burp Suite: Manual and automated testing
    - SonarQube: Code analysis (static analysis)

  secure_code_review: |
    - Look for string concatenation in SQL queries
    - Check for parameterized queries
    - Verify input validation
    - Ensure error messages don't leak info

common_mistakes:
  - name: "Escaping instead of parameterizing"
    example: "addslashes(email) or mysql_escape_string()"
    problem: "Escaping can be bypassed; encoding issues"
    fix: "Use parameterized queries (database handles escaping)"

  - name: "Parameterizing the wrong thing"
    bad: |
      table_name = request.form['table']
      query = f"SELECT * FROM ? WHERE id = ?"  # WRONG
      query = f"SELECT * FROM {table_name} WHERE id = ?"
    problem: "Table/column names cannot be parameterized"
    fix: |
      ALLOWED_TABLES = {'users', 'orders', 'products'}
      if table_name not in ALLOWED_TABLES:
        raise ValueError("Invalid table")
      query = f"SELECT * FROM {table_name} WHERE id = ?"

  - name: "Trust user input"
    problem: "Assuming user input is safe because validation exists"
    fix: "Validate AND parameterize; defense in depth"

  - name: "SQL injection in WHERE/HAVING/ORDER BY"
    forgotten: "Developers remember query WHERE clauses, forget ORDER BY"
    example: |
      # VULNERABLE: ORDER BY not parameterized
      sort_by = request.form['sort']
      query = f"SELECT * FROM users ORDER BY {sort_by}"

    fix: |
      ALLOWED_SORTS = ['id', 'email', 'created_at']
      if sort_by not in ALLOWED_SORTS:
        raise ValueError("Invalid sort")
      query = f"SELECT * FROM users ORDER BY {sort_by}"

best_practices:
  - name: "Always use parameterized queries"
    description: "Non-negotiable; the primary defense"

  - name: "Validate all user input"
    description: "Check format, length, allowed values"

  - name: "Use ORMs when possible"
    description: "Less raw SQL means less injection risk"

  - name: "Principle of least privilege"
    description: "Database user has minimal required permissions"

  - name: "Don't reveal database errors to users"
    description: "Log errors; show generic messages"

  - name: "Use WAF as additional layer"
    description: "Defense in depth; not substitute for code fixes"

  - name: "Test for SQL injection"
    description: "Include in security testing and code review"

  - name: "Keep dependencies updated"
    description: "Frameworks patch injection vulnerabilities"

blog_hooks:
  beginner:
    analogy: |
      SQL injection is like a restaurant taking phone orders:
      - BAD: Chef writes down exactly what customer says
        "Steak. By the way, cancel all orders--"
        Chef cancels all orders thinking it's part of order

      - GOOD: Restaurant has order form with checkboxes
        Customer input can't change the form structure
        Malicious input treated as menu item name (invalid, rejected)

      Parameterized queries are like the form structure.

  intermediate:
    focus: "SQL injection prevention patterns"
    key_points:
      - "Parameterized queries vs string concatenation"
      - "Input validation and whitelist approaches"
      - "ORM usage and its limitations"
      - "Error handling and information disclosure"

  advanced:
    focus: "Complex SQL injection scenarios"
    key_points:
      - "Blind SQL injection and time-based attacks"
      - "SQL injection in ORDER BY and other clauses"
      - "Bypassing WAF and input validation"
      - "Finding SQL injection in legacy code"
