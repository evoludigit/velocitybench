# Secrets Management
# VelocityBench Knowledge Corpus

id: secrets-management
name: "Secrets Management Best Practices"
category: security
type: pattern
severity: critical
tags:
  - security
  - secrets
  - configuration
  - encryption
  - devops

summary:
  short: "Securely store, access, and rotate sensitive credentials"
  long: |
    Secrets management involves securely handling sensitive data like API keys, database
    passwords, encryption keys, and certificates. Secrets should never be hardcoded in
    source code, committed to version control, or logged. Use dedicated secrets managers,
    environment variables, or encrypted configuration with proper access controls and
    rotation policies.

problem:
  description: |
    Poor secrets handling creates critical vulnerabilities:
    - Hardcoded secrets in source code get committed to Git
    - Secrets in plaintext config files are easily leaked
    - Shared secrets between environments enable lateral movement
    - No rotation means compromised secrets stay valid indefinitely
    - Logging secrets exposes them to many systems

  symptoms:
    - name: "Secrets in Git history"
      description: "API keys or passwords committed to repository"
      detection: "git-secrets scan, GitHub secret scanning alerts"

    - name: "Shared credentials"
      description: "Same password used in dev, staging, production"
      detection: "Environment comparison, access audits"

    - name: "Long-lived secrets"
      description: "Same credentials used for years"
      detection: "Last rotation date audit"

solution:
  principle: "Secrets should be short-lived, scoped, audited, and never in code"

  components:
    - name: "Secrets Manager"
      type: "infrastructure"
      purpose: "Centralized, encrypted storage with access control"

    - name: "Environment Variables"
      type: "runtime"
      purpose: "Inject secrets at deployment time"

    - name: "Secret Rotation"
      type: "process"
      purpose: "Regularly replace secrets to limit exposure"

implementation:
  environment_variables:
    python: |
      import os
      from functools import lru_cache

      @lru_cache
      def get_settings():
          """Load settings from environment variables."""
          return {
              "database_url": os.environ["DATABASE_URL"],
              "api_key": os.environ["API_KEY"],
              "jwt_secret": os.environ["JWT_SECRET"],
          }

      # Usage
      settings = get_settings()
      db = connect(settings["database_url"])

      # NEVER do this:
      # API_KEY = "sk-abc123..."  # Hardcoded secret!
      # db_password = "password123"  # In source code!

    dotenv_development: |
      # .env file (for local development ONLY)
      # NEVER commit .env to version control!

      DATABASE_URL=postgresql://localhost/myapp_dev
      API_KEY=dev_key_not_for_production
      JWT_SECRET=dev_secret_change_in_prod

      # .gitignore
      .env
      .env.local
      .env.*.local

    python_with_dotenv: |
      from dotenv import load_dotenv
      import os

      # Load .env file in development
      load_dotenv()

      # Access variables (works with both .env and real env vars)
      database_url = os.getenv("DATABASE_URL")

  secrets_managers:
    aws_secrets_manager: |
      import boto3
      from botocore.exceptions import ClientError
      import json

      def get_secret(secret_name: str, region: str = "us-east-1") -> dict:
          """Retrieve secret from AWS Secrets Manager."""
          client = boto3.client("secretsmanager", region_name=region)

          try:
              response = client.get_secret_value(SecretId=secret_name)
              return json.loads(response["SecretString"])
          except ClientError as e:
              raise RuntimeError(f"Failed to retrieve secret: {e}")

      # Usage
      db_creds = get_secret("production/database")
      connection_string = (
          f"postgresql://{db_creds['username']}:{db_creds['password']}"
          f"@{db_creds['host']}/{db_creds['database']}"
      )

    hashicorp_vault: |
      import hvac

      class VaultClient:
          def __init__(self, url: str, token: str):
              self.client = hvac.Client(url=url, token=token)

          def get_secret(self, path: str) -> dict:
              """Read secret from Vault KV store."""
              response = self.client.secrets.kv.v2.read_secret_version(
                  path=path
              )
              return response["data"]["data"]

          def get_database_creds(self, role: str) -> dict:
              """Get dynamic database credentials."""
              response = self.client.secrets.database.generate_credentials(
                  name=role
              )
              return {
                  "username": response["data"]["username"],
                  "password": response["data"]["password"],
                  "ttl": response["lease_duration"]
              }

      # Usage - dynamic credentials that auto-expire
      vault = VaultClient(url="https://vault.company.com", token=os.environ["VAULT_TOKEN"])
      db_creds = vault.get_database_creds("myapp-db-role")
      # Credentials valid for limited time, automatically rotated

    kubernetes_secrets: |
      # Creating a secret
      kubectl create secret generic db-credentials \
        --from-literal=username=dbuser \
        --from-literal=password=secretpassword

      # Or from file:
      kubectl create secret generic tls-secret \
        --from-file=tls.crt=./cert.pem \
        --from-file=tls.key=./key.pem

      ---
      # Using secrets in Pod (as environment variables)
      apiVersion: v1
      kind: Pod
      metadata:
        name: myapp
      spec:
        containers:
        - name: myapp
          image: myapp:latest
          env:
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: password

      ---
      # Or mount as files
      spec:
        containers:
        - name: myapp
          volumeMounts:
          - name: secrets
            mountPath: "/etc/secrets"
            readOnly: true
        volumes:
        - name: secrets
          secret:
            secretName: db-credentials

  secret_rotation:
    python: |
      import secrets
      from datetime import datetime, timedelta
      from typing import Optional

      class SecretRotator:
          """Rotate secrets with zero-downtime."""

          def __init__(self, secrets_manager, notification_service):
              self.secrets = secrets_manager
              self.notify = notification_service

          async def rotate_api_key(self, key_name: str):
              """Rotate API key with overlap period."""

              # Generate new key
              new_key = secrets.token_urlsafe(32)

              # Get current key (will be deprecated)
              old_key = await self.secrets.get(key_name)

              # Store both keys temporarily
              await self.secrets.set(f"{key_name}_new", new_key)
              await self.secrets.set(f"{key_name}_old", old_key)

              # Update primary key
              await self.secrets.set(key_name, new_key)

              # Notify services to reload
              await self.notify.publish("secret_rotated", {
                  "key_name": key_name,
                  "rotation_time": datetime.utcnow().isoformat()
              })

              # Schedule cleanup of old key (after grace period)
              await self.schedule_cleanup(f"{key_name}_old", delay=timedelta(hours=24))

          def validate_key(self, key_name: str, provided_key: str) -> bool:
              """Accept both old and new keys during rotation."""
              current = self.secrets.get(key_name)
              old = self.secrets.get(f"{key_name}_old")

              return provided_key == current or provided_key == old

  git_secrets_prevention:
    pre_commit_hook: |
      # .pre-commit-config.yaml
      repos:
        - repo: https://github.com/Yelp/detect-secrets
          rev: v1.4.0
          hooks:
            - id: detect-secrets
              args: ['--baseline', '.secrets.baseline']

        - repo: https://github.com/awslabs/git-secrets
          rev: master
          hooks:
            - id: git-secrets

    gitignore_patterns: |
      # .gitignore - Always exclude secrets
      .env
      .env.*
      *.pem
      *.key
      *secret*
      credentials.json
      service-account.json

best_practices:
  - name: "Never log secrets"
    example: |
      # BAD
      logger.info(f"Connecting with password: {password}")

      # GOOD
      logger.info("Connecting to database...")
      # Or mask it:
      logger.debug(f"Using API key: {api_key[:4]}...{api_key[-4:]}")

  - name: "Use different secrets per environment"
    example: |
      # Each environment has unique secrets
      # prod: DATABASE_URL=postgresql://prod-db/app
      # staging: DATABASE_URL=postgresql://staging-db/app
      # dev: DATABASE_URL=postgresql://localhost/app_dev

  - name: "Principle of least privilege"
    example: |
      # Don't give app full database admin access
      # Create limited role:
      CREATE ROLE app_user WITH LOGIN PASSWORD 'xxx';
      GRANT SELECT, INSERT, UPDATE ON app_tables TO app_user;
      -- No DELETE, no DROP, no admin access

  - name: "Rotate secrets regularly"
    schedule: |
      - API keys: Every 90 days
      - Database passwords: Every 30 days
      - Encryption keys: Annually (with key versioning)
      - After any suspected compromise: Immediately

blog_hooks:
  beginner:
    analogy: |
      Secrets management is like handling house keys:
      - Bad: Leave key under doormat (hardcoded in code)
      - Bad: Same key for all doors (shared secrets)
      - Good: Key safe with code (secrets manager)
      - Good: Change locks periodically (rotation)

  intermediate:
    focus: "Implementing secrets managers in applications"
    key_points:
      - "Environment variables vs secrets managers"
      - "Kubernetes secrets and ConfigMaps"
      - "AWS Secrets Manager / HashiCorp Vault basics"
      - "Pre-commit hooks to prevent leaks"

  advanced:
    focus: "Dynamic secrets and zero-trust architecture"
    key_points:
      - "Dynamic database credentials with Vault"
      - "Secret rotation with zero downtime"
      - "Service mesh integration (mTLS)"
      - "Secrets in CI/CD pipelines"
