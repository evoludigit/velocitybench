# ============================================================
# BLOG HOOKS (for AI generation)
# ============================================================
blog_hooks:
  beginner:
    analogy: |
      Think of it like a person having three forms of identification:
      - **Social Security Number** (pk_*): Used by government systems internally,
        never shared publicly, optimized for database lookups
      - **Passport Number** (id UUID): Official ID you share with airports and
        banks, globally unique, safe to show
      - **Nickname** (username): What friends call you, easy to remember,
        might change over time

    common_mistakes:
      - "Using UUID as the primary key (performance issue)"
      - "Exposing sequential IDs in API responses (security issue)"
      - "Not using integer foreign keys (performance issue)"

    key_takeaways:
      - "Use INTEGER for internal operations (fast)"
      - "Use UUID for external exposure (safe)"
      - "Use slugs for human-facing URLs (friendly)"

  intermediate:
    migration_guide: |
      If you have an existing system using UUID primary keys:
      1. Add pk_* column as SERIAL
      2. Populate pk_* with sequential values
      3. Add fk_* columns pointing to pk_*
      4. Update JOINs to use fk_*/pk_*
      5. Keep id (UUID) for API exposure
      6. Monitor performance improvements

    framework_considerations:
      - framework: "Django"
        notes: "Use BigAutoField for pk_*, UUIDField for id"
      - framework: "Rails"
        notes: "Use integer :id (rename to :pk_*), add uuid :public_id"
      - framework: "Spring"
        notes: "@GeneratedValue for pk_*, @Column for uuid"

  advanced:
    performance_deep_dive: true
    benchmark_comparison: true
    distributed_systems_considerations: |
      In distributed systems, the Trinity Pattern extends naturally:
      - pk_* remains local to each database shard
      - id (UUID) provides global uniqueness across shards
      - Slug/identifier can include shard hints for routing

# ============================================================
# APPLICABLE FRAMEWORKS
# ============================================================
applicable_frameworks:
  universal:
    - "Works with all 26 VelocityBench frameworks"
    - "Database-level pattern, framework-agnostic"

  special_considerations:
    - framework: "postgraphile"
      notes: "Use smart tags to hide pk_*/fk_* from GraphQL schema"
      code: |
        COMMENT ON COLUMN tb_user.pk_user IS E'@omit';
        COMMENT ON COLUMN tb_post.fk_author IS E'@omit';

    - framework: "fraiseql"
      notes: "Use views to expose only id and slug, hide pk_*/fk_*"
      code: |
        CREATE VIEW v_user AS
        SELECT id, username, email, first_name, last_name, bio
        FROM tb_user;  -- pk_user intentionally excluded

