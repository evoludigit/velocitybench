summary:
  short: Choosing between synchronous and asynchronous communication
  long: Choosing between synchronous and asynchronous communication. This pattern
    provides comprehensive guidance on implementing and optimizing this aspect of
    software engineering.
problem:
  description: Issues arise when choosing between synchronous and asynchronous communication
    is not properly implemented
  symptoms:
  - System performance degrades without proper request-response-patterns
  - Lack of visibility into system behavior
  - Frequent failures and reliability issues
  - Difficult to debug and troubleshoot problems
  - Scaling issues as load increases
