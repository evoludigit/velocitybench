blog_hooks:
  beginner:
    analogy: |
      Think of ordering food:
      - REST is like a fixed menu - you order dish #5 and get everything on the plate
      - GraphQL is like a buffet - you pick exactly what you want
      - gRPC is like a fast-food drive-through - optimized for speed, less flexible

  intermediate:
    focus: "Implementation tradeoffs and when to use each"
    key_points:
      - "REST caching strategies (ETags, Cache-Control)"
      - "GraphQL DataLoader and query complexity"
      - "gRPC service mesh integration"

  advanced:
    focus: "Performance optimization and hybrid architectures"
    key_points:
      - "GraphQL federation for microservices"
      - "gRPC load balancing strategies"
      - "Hybrid REST + GraphQL approaches"
