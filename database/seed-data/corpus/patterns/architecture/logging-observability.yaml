blog_hooks:
  beginner:
    analogy: |
      Observability is like a car's dashboard:
      - Logs: Trip computer messages ("Door ajar", "Low fuel")
      - Metrics: Gauges (speed, RPM, fuel level)
      - Traces: GPS navigation showing route taken
      Without a dashboard, you're driving blind. Same with software!

  intermediate:
    focus: "Implementing the three pillars"
    key_points:
      - "Structured logging best practices"
      - "Key metrics to track (RED/USE methods)"
      - "Distributed tracing setup"
      - "Correlation IDs for debugging"

  advanced:
    focus: "Observability at scale"
    key_points:
      - "Log sampling and aggregation"
      - "High-cardinality metrics"
      - "Trace sampling strategies"
      - "SLIs, SLOs, and error budgets"
