# PERFORMANCE DATA
# ============================================================
performance:
  benchmarks:
    - scenario: "Fetch 100 posts with authors"
      results:
        - approach: "N+1 (101 queries)"
          avg_time: "450ms"
          db_connections: "101"

        - approach: "Eager load (1 query)"
          avg_time: "15ms"
          db_connections: "1"

        - approach: "DataLoader (2 queries)"
          avg_time: "25ms"
          db_connections: "2"

    - scenario: "Fetch 1000 posts with authors and comments"
      results:
        - approach: "N+1"
          avg_time: "12,000ms"
          db_connections: "2001"

        - approach: "Optimized"
          avg_time: "150ms"
          db_connections: "3"

  scaling_impact: |
    N+1 scales linearly with data:
    - 10 items: 10ms overhead → "fast enough"
    - 100 items: 100ms overhead → "noticeable"
    - 1000 items: 1000ms overhead → "slow"
    - 10000 items: 10000ms overhead → "unusable"
