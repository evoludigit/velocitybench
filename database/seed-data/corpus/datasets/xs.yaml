# XS Dataset Configuration
# Ultra-small dataset for development and quick testing

id: xs
name: "Extra Small"
description: "Fast-loading dataset for development and concept learning"

# ============================================================
# COUNTS
# ============================================================
counts:
  users: 100
  posts: 500
  comments: 2000
  categories: 10
  post_categories: 750      # ~1.5 categories per post
  user_follows: 500         # ~5 follows per user
  post_likes: 2500          # ~5 likes per post
  user_profiles: 100        # 1:1 with users

# ============================================================
# DISTRIBUTIONS
# ============================================================
distributions:
  posts_per_user:
    type: normal
    mean: 5
    std: 2
    min: 0
    max: 15
    description: "Most users have 3-7 posts, some power users have more"

  comments_per_post:
    type: exponential
    lambda: 4
    min: 0
    max: 50
    description: "Most posts have few comments, some go viral"

  nested_comment_probability: 0.15
  description: "15% of comments are replies to other comments"

# ============================================================
# PERFORMANCE EXPECTATIONS
# ============================================================
performance_expectations:
  load_time: "<1 second"
  database_size: "~10 MB"

  query_times:
    simple_lookup: "<1ms"
    user_with_posts: "<5ms"
    nested_3_levels: "<10ms"
    full_table_scan: "<50ms"

  visibility:
    n_plus_one_visible: false
    caching_benefit_visible: false
    connection_pooling_visible: false

  notes: |
    XS dataset is intentionally small to:
    - Load quickly during development
    - Enable fast test iteration
    - Demonstrate concepts without performance noise

# ============================================================
# USE CASES
# ============================================================
use_cases:
  - name: "Local development"
    description: "Quick database reset for dev workflow"

  - name: "Unit tests"
    description: "Fast test execution with real data"

  - name: "Documentation examples"
    description: "Screenshots and code examples"

  - name: "Learning tutorials"
    description: "Walkthrough examples in blog posts"

# ============================================================
# FIXED FIXTURES
# ============================================================
fixtures:
  description: |
    These 5 users always exist in every dataset size.
    They have predictable UUIDs for reproducible testing.

  users:
    - pk: 1
      id: "11111111-1111-1111-1111-111111111111"
      username: "alice"
      role: "admin"
      post_count: 10

    - pk: 2
      id: "22222222-2222-2222-2222-222222222222"
      username: "bob"
      role: "user"
      post_count: 8

    - pk: 3
      id: "33333333-3333-3333-3333-333333333333"
      username: "charlie"
      role: "user"
      post_count: 5

    - pk: 4
      id: "44444444-4444-4444-4444-444444444444"
      username: "diana"
      role: "moderator"
      post_count: 12

    - pk: 5
      id: "55555555-5555-5555-5555-555555555555"
      username: "eve"
      role: "user"
      post_count: 3

# ============================================================
# BLOG HOOKS
# ============================================================
blog_hooks:
  when_to_use: |
    Use XS dataset when:
    - Running tests locally during development
    - Creating documentation screenshots
    - Demonstrating API concepts
    - Quick iteration on schema changes

  limitations: |
    XS dataset is NOT suitable for:
    - Performance benchmarking (too small to show differences)
    - N+1 detection (problem not visible at this scale)
    - Connection pooling testing (not enough load)
    - Production-like testing (unrealistic data volume)
